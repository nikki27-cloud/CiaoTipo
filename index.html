<!DOCTYPE html>
<html lang="ja" data-lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>CiaoTipo</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Fredoka+One&family=Lato:wght@300;400;700&family=UnifrakturMaguntia&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f5f6fc;--bg2:#eaecf7;--card:#fff;--card-border:#cdd1ec;
  --text:#1a1c3a;--text-muted:#6870aa;--surface:rgba(0,0,0,.03);
  --shadow:rgba(80,90,180,.13);--modal-bg:linear-gradient(160deg,#fff,#eef0ff);
  --input-bg:rgba(0,0,0,.04);--input-border:rgba(0,0,0,.13);
  --hint-bar-bg:rgba(255,255,255,.85);
}
@media(prefers-color-scheme:dark){:root{
  --bg:#0e0e1c;--bg2:#151528;--card:#1c1c38;--card-border:#2c2c58;
  --text:#e6e8ff;--text-muted:#8890bb;--surface:rgba(255,255,255,.04);
  --shadow:rgba(0,0,0,.5);--modal-bg:linear-gradient(160deg,#1a1a3a,#111128);
  --input-bg:rgba(255,255,255,.06);--input-border:rgba(255,255,255,.12);
  --hint-bar-bg:rgba(0,0,0,.38);
}}
[data-theme=light]{
  --bg:#f5f6fc;--bg2:#eaecf7;--card:#fff;--card-border:#cdd1ec;
  --text:#1a1c3a;--text-muted:#6870aa;--surface:rgba(0,0,0,.03);
  --shadow:rgba(80,90,180,.13);--modal-bg:linear-gradient(160deg,#fff,#eef0ff);
  --input-bg:rgba(0,0,0,.04);--input-border:rgba(0,0,0,.13);
  --hint-bar-bg:rgba(255,255,255,.85);
}
[data-theme=dark]{
  --bg:#0e0e1c;--bg2:#151528;--card:#1c1c38;--card-border:#2c2c58;
  --text:#e6e8ff;--text-muted:#8890bb;--surface:rgba(255,255,255,.04);
  --shadow:rgba(0,0,0,.5);--modal-bg:linear-gradient(160deg,#1a1a3a,#111128);
  --input-bg:rgba(255,255,255,.06);--input-border:rgba(255,255,255,.12);
  --hint-bar-bg:rgba(0,0,0,.38);
}
[data-lang=it]{--accent:#c8920a;--accent2:#6b5fdd;--green:#2a9e60;--hint-color:#d06818;--glow:rgba(200,146,10,.28);}
[data-lang=de]{--accent:#a87c00;--accent2:#7a6e00;--green:#2a9e60;--hint-color:#b87200;--glow:rgba(168,124,0,.28);}
[data-lang=en]{--accent:#1558a0;--accent2:#a81028;--green:#2a9e60;--hint-color:#b05810;--glow:rgba(21,88,160,.24);}
@media(prefers-color-scheme:dark){
  [data-lang=it]{--accent:#dda828;--accent2:#8a7aff;--green:#3ed476;--hint-color:#f09040;--glow:rgba(221,168,40,.3);}
  [data-lang=de]{--accent:#c8a020;--accent2:#a89a10;--green:#3ed476;--hint-color:#d89828;--glow:rgba(200,160,32,.3);}
  [data-lang=en]{--accent:#4a92e8;--accent2:#d84060;--green:#3ed476;--hint-color:#e09030;--glow:rgba(74,146,232,.26);}
}
[data-theme=light][data-lang=it]{--accent:#c8920a;--accent2:#6b5fdd;--green:#2a9e60;--hint-color:#d06818;--glow:rgba(200,146,10,.28);}
[data-theme=light][data-lang=de]{--accent:#a87c00;--accent2:#7a6e00;--green:#2a9e60;--hint-color:#b87200;--glow:rgba(168,124,0,.28);}
[data-theme=light][data-lang=en]{--accent:#1558a0;--accent2:#a81028;--green:#2a9e60;--hint-color:#b05810;--glow:rgba(21,88,160,.24);}
[data-theme=dark][data-lang=it]{--accent:#dda828;--accent2:#8a7aff;--green:#3ed476;--hint-color:#f09040;--glow:rgba(221,168,40,.3);}
[data-theme=dark][data-lang=de]{--accent:#c8a020;--accent2:#a89a10;--green:#3ed476;--hint-color:#d89828;--glow:rgba(200,160,32,.3);}
[data-theme=dark][data-lang=en]{--accent:#4a92e8;--accent2:#d84060;--green:#3ed476;--hint-color:#e09030;--glow:rgba(74,146,232,.26);}

*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Lato',sans-serif;min-height:100vh;overflow-x:hidden;transition:background .3s,color .3s;}

/* HEADER */
header{display:flex;align-items:center;justify-content:space-between;padding:10px 18px;border-bottom:1px solid var(--card-border);background:var(--bg2);position:sticky;top:0;z-index:200;flex-wrap:wrap;gap:7px;transition:background .3s;position:relative;}
header::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;}
[data-lang=it] header::after{background:linear-gradient(90deg,#4a9a5a 33%,#e0e0e0 33% 66%,#c02828 66%);}
[data-lang=de] header::after{background:linear-gradient(90deg,#222 33%,#c8a020 33% 66%,#c8a020 66%);}
[data-lang=en] header::after{background:linear-gradient(90deg,#a81028 33%,#e0e0e0 33% 66%,#1558a0 66%);}
.logo{font-family:'Cinzel Decorative',serif;font-size:1rem;color:var(--accent);letter-spacing:2px;white-space:nowrap;}
[data-lang=de] .logo{font-family:'UnifrakturMaguntia',cursive;font-size:1.4rem;}
[data-lang=en] .logo{font-family:'IM Fell English',serif;font-size:1.15rem;font-style:italic;}
.header-right{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.score-badge{background:var(--card);border:1px solid var(--card-border);border-radius:20px;padding:4px 13px;font-size:.84rem;font-weight:700;color:var(--accent);white-space:nowrap;}
.score-badge span{color:var(--text-muted);font-weight:300;margin:0 2px;}
.styled-select{appearance:none;background:var(--card);border:1.5px solid var(--card-border);border-radius:8px;color:var(--text);padding:5px 26px 5px 9px;font-family:'Lato',sans-serif;font-size:.8rem;cursor:pointer;background-repeat:no-repeat;background-position:right 8px center;transition:border-color .2s;}
.styled-select:focus{outline:none;border-color:var(--accent);}
#lang-select{border-color:var(--accent);}
.toggle-wrap{display:flex;align-items:center;gap:5px;font-size:.74rem;color:var(--text-muted);white-space:nowrap;user-select:none;}
.toggle{position:relative;width:32px;height:18px;display:inline-block;}
.toggle input{opacity:0;width:0;height:0;}
.toggle-slider{position:absolute;inset:0;background:var(--card-border);border-radius:18px;transition:background .25s;cursor:pointer;}
.toggle-slider::before{content:'';position:absolute;width:12px;height:12px;left:3px;top:3px;background:#fff;border-radius:50%;transition:transform .25s;}
.toggle input:checked+.toggle-slider{background:var(--accent);}
.toggle input:checked+.toggle-slider::before{transform:translateX(14px);}
.hdr-btn{background:var(--card);border:1.5px solid var(--card-border);border-radius:8px;color:var(--text);padding:4px 11px;font-family:'Lato',sans-serif;font-size:.79rem;cursor:pointer;transition:background .2s,border-color .2s,color .2s;white-space:nowrap;}
.hdr-btn:hover{border-color:var(--accent);}
.hdr-btn.danger{border-color:#c04050;color:#c04050;}
.hdr-btn.danger:hover{background:#c04050;color:#fff;}
.hdr-btn.accent2{border-color:var(--accent2);color:var(--accent2);}
.hdr-btn.accent2:hover{background:var(--accent2);color:#fff;}
.hdr-btn.pts-on{background:var(--accent);color:#fff;border-color:var(--accent);}
.hdr-btn.pts-on:hover{background:color-mix(in srgb,var(--accent) 80%,#000);}

/* SCOREBAR (multi) */
#scorebar{display:none;background:var(--bg2);border-bottom:1px solid var(--card-border);padding:5px 18px;gap:10px;flex-wrap:wrap;align-items:center;font-size:.78rem;}
#scorebar.on{display:flex;}
/* シングルポイントバー */
#scorebar.solo{justify-content:center;}
#scorebar.solo #turn-label{display:none;}
.sb-my-pts{font-family:'Fredoka One',cursive;font-size:1.3rem;color:var(--green);letter-spacing:1px;text-shadow:0 1px 6px rgba(42,158,96,.4);}
.sb-my-label{font-size:.72rem;color:var(--text-muted);margin-right:4px;}
/* マルチ：自分のポイント強調 */
.sb-player-me{font-weight:900;font-size:.92rem;color:var(--text);}
.sb-player-me .sb-pt-val{font-family:'Fredoka One',cursive;font-size:1.1rem;color:var(--green);}
.sb-player-other{opacity:.72;}
.sb-player-other .sb-pt-val{font-family:'Fredoka One',cursive;}
.sb-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:3px;}
#turn-label{font-weight:700;color:var(--accent);padding:3px 9px;background:var(--surface);border-radius:7px;}

/* HINT BAR */
.hint-bar{background:var(--hint-bar-bg);border-bottom:1px solid var(--card-border);padding:5px 18px;font-size:.74rem;color:var(--text-muted);display:flex;align-items:center;gap:14px;flex-wrap:wrap;backdrop-filter:blur(6px);}
.hint-bar kbd{display:inline-block;background:var(--card);border:1px solid var(--card-border);border-radius:4px;padding:1px 6px;font-size:.72rem;font-family:monospace;color:var(--accent);margin:0 1px;}
.hint-bar .sep{color:var(--card-border);}

/* MILESTONE — image-based, no background */
#milestone-msg{
  position:fixed;top:40%;left:50%;
  transform:translate(-50%,-50%) scale(.5) rotate(-4deg);
  background:none;border:none;padding:0;
  z-index:9999;opacity:0;pointer-events:none;
  transition:opacity .35s, transform .35s cubic-bezier(.175,.885,.32,1.4);
  text-align:center;
  filter:drop-shadow(0 6px 24px rgba(0,0,0,.4));
}
#milestone-msg.show{opacity:1;transform:translate(-50%,-50%) scale(1) rotate(-2deg);}
#milestone-msg img{max-height:120px;max-width:340px;display:block;}
/* fallback text (if no image) */
#milestone-msg .ms-text{
  font-family:'Fredoka One',cursive;
  font-size:3rem;font-weight:900;color:#fff;
  text-shadow:-3px -3px 0 #3a2800,3px -3px 0 #3a2800,-3px 3px 0 #3a2800,3px 3px 0 #3a2800,0 4px 0 #3a2800,0 -4px 0 #3a2800;
  letter-spacing:2px;
  background:linear-gradient(90deg,#ffb3d1,#b3d1ff,#b3ffce,#fff3b3,#ffb3d1);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  background-size:200%;animation:ms-shift 1.2s linear infinite;
}
@keyframes ms-shift{to{background-position:200%;}}
/* bonus popup */
#bonus-msg{
  position:fixed;top:32%;left:50%;
  transform:translate(-50%,-50%) scale(.5);
  background:none;border:none;
  font-family:'Fredoka One',cursive;
  font-size:2.4rem;font-weight:900;color:#ffe060;
  text-shadow:-3px -3px 0 #7a4800,3px -3px 0 #7a4800,-3px 3px 0 #7a4800,3px 3px 0 #7a4800,0 4px 0 #7a4800,0 -4px 0 #7a4800;
  z-index:9998;opacity:0;pointer-events:none;
  transition:opacity .3s,transform .35s cubic-bezier(.175,.885,.32,1.4);text-align:center;
}
#bonus-msg.show{opacity:1;transform:translate(-50%,-50%) scale(1);}

/* PTS POPUP — shown every correct answer, same timing as milestone */
#pts-popup{
  position:fixed;top:58%;left:50%;
  transform:translate(-50%,-50%) translateY(10px);
  z-index:9997;pointer-events:none;opacity:0;
  text-align:center;
  transition:opacity .28s ease-out, transform .32s cubic-bezier(.175,.885,.32,1.275);
}
#pts-popup.show{opacity:1;transform:translate(-50%,-50%) translateY(0);}
.pp-base{
  display:inline-block;
  font-family:'Fredoka One',cursive;
  font-size:1.9rem;font-weight:900;
  color:#4cdf80;
  text-shadow:-2px -2px 0 #0a3a1a,2px -2px 0 #0a3a1a,-2px 2px 0 #0a3a1a,2px 2px 0 #0a3a1a,0 3px 0 #0a3a1a;
  letter-spacing:1px;
}
.pp-perfect{
  display:block;
  font-family:'Fredoka One',cursive;
  font-size:1.05rem;font-weight:900;
  background:linear-gradient(90deg,#cc44ff,#8844ff,#ff44cc);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  text-shadow:none;
  margin-bottom:2px;letter-spacing:1.5px;
}
.pp-bonus{
  display:block;
  font-family:'Fredoka One',cursive;
  font-size:.95rem;font-weight:900;
  color:#f0a030;
  text-shadow:-1px -1px 0 #5a3000,1px -1px 0 #5a3000,-1px 1px 0 #5a3000,1px 1px 0 #5a3000;
  margin-top:2px;
}

/* MAIN / GRID */
main{padding:16px 18px;max-width:1500px;margin:0 auto;}
#category-title{font-family:'Cinzel Decorative',serif;font-size:.8rem;color:var(--text-muted);margin-bottom:13px;letter-spacing:3px;text-transform:uppercase;}
[data-lang=de] #category-title{font-family:'UnifrakturMaguntia',cursive;font-size:1rem;}
[data-lang=en] #category-title{font-family:'IM Fell English',serif;}
.word-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(106px,1fr));gap:8px;}

/* CARD */
.word-card{background:var(--card);border:1.5px solid var(--card-border);border-radius:12px;padding:8px 6px 6px;display:flex;flex-direction:column;align-items:center;gap:3px;position:relative;transition:border-color .25s,box-shadow .25s,transform .18s;overflow:visible;}
.word-card:hover{transform:translateY(-2px);}
.word-card.solved{border-color:var(--green);box-shadow:0 0 9px rgba(42,158,96,.18),inset 0 0 14px rgba(42,158,96,.03);}
.word-card.mp-highlight{border-color:var(--player-color,#aaa) !important;box-shadow:0 0 10px var(--player-color,#aaa) !important;}
.card-icon{font-size:2rem;line-height:1;user-select:none;}
.card-ja{font-size:.63rem;color:var(--text-muted);text-align:center;line-height:1.3;padding:0 2px;word-break:keep-all;}

/* solved word — same position as input, wraps after 12 chars */
.card-answer{
  font-size:.64rem;color:var(--green);font-weight:700;
  text-align:center;word-break:break-all;overflow-wrap:anywhere;
  width:100%;line-height:1.3;min-height:22px;
  display:flex;align-items:center;justify-content:center;
  padding:2px 4px;
  opacity:0;transform:translateY(3px);
  transition:opacity .4s,transform .4s;
}
.word-card.solved .card-answer{opacity:1;transform:translateY(0);}
.card-input{width:100%;background:var(--input-bg);border:1px solid var(--input-border);border-radius:6px;color:var(--text);font-family:'Lato',sans-serif;font-size:.71rem;padding:3px 4px;text-align:center;outline:none;min-height:22px;transition:border-color .2s,box-shadow .2s;}
.card-input:focus{border-color:var(--accent2);box-shadow:0 0 0 2px rgba(107,95,221,.12);}
.card-input.wrong{border-color:#c04050!important;animation:shake .28s;}
.card-input:disabled{opacity:0;pointer-events:none;height:0;padding:0;min-height:0;border:none;}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}

/* PEEK BTN */
.peek-btn{position:absolute;top:4px;right:4px;background:none;border:none;cursor:pointer;font-size:0;padding:2px;opacity:.38;color:var(--text-muted);transition:opacity .2s;z-index:5;display:flex;align-items:center;}
.peek-btn:hover{opacity:.9;}
.peek-btn svg{display:block;}
.peek-btn.peeking svg{animation:hgspin 1s linear infinite;}
@keyframes hgspin{to{transform:rotate(180deg)}}
.peek-reveal{position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:rgba(192,64,64,.92);color:#fff;border-radius:7px;padding:4px 10px;font-size:.73rem;font-weight:700;white-space:nowrap;pointer-events:none;z-index:400;box-shadow:0 3px 12px rgba(0,0,0,.32);animation:fadein .14s ease-out;}
@keyframes fadein{from{opacity:0;transform:translateX(-50%) translateY(4px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.peek-timer{position:absolute;bottom:0;left:0;height:2px;background:linear-gradient(90deg,#d85050,#e8a040);border-radius:0 0 12px 12px;z-index:6;}

/* TRIVIA BTN — solved cards only */
.trivia-btn{position:absolute;top:4px;left:4px;background:none;border:none;cursor:pointer;font-size:.72rem;padding:1px 3px;opacity:.5;color:var(--accent);transition:opacity .2s;z-index:5;font-weight:700;line-height:1;
  animation:trivia-wiggle 3.2s ease-in-out infinite;
  transform-origin:center;
}
.trivia-btn:hover,.trivia-btn.active{opacity:1;animation:none;transform:scale(1.3);}
@keyframes trivia-wiggle{
  0%,60%,100%{transform:rotate(0deg) scale(1);}
  65%{transform:rotate(-18deg) scale(1.2);}
  70%{transform:rotate(14deg) scale(1.25);}
  75%{transform:rotate(-10deg) scale(1.2);}
  80%{transform:rotate(6deg) scale(1.1);}
  85%{transform:rotate(0deg) scale(1);}
}
.trivia-popup{position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:var(--bg2);border:1px solid var(--card-border);border-radius:9px;padding:8px 11px;font-size:.71rem;min-width:155px;max-width:215px;pointer-events:none;z-index:400;box-shadow:0 4px 16px var(--shadow);line-height:1.55;color:var(--text);animation:fadein .14s ease-out;white-space:normal;}
.trivia-popup b{color:var(--accent);font-size:.68rem;display:block;margin-bottom:2px;letter-spacing:.4px;}

/* WRONG LANG HINT */
.wrong-lang-hint{
  position:absolute;inset:0;border-radius:11px;
  background:rgba(60,60,100,.55);
  backdrop-filter:blur(3px);
  display:flex;align-items:center;justify-content:center;
  z-index:50;pointer-events:none;
  opacity:0;
  transition:opacity .35s ease-in;
  border:1.5px solid rgba(180,180,255,.35);
}
.wrong-lang-hint.show{opacity:1;}
.wrong-lang-hint span{
  color:#fff;font-size:.68rem;font-weight:700;
  text-align:center;line-height:1.5;padding:4px 8px;
  background:rgba(0,0,0,.32);border-radius:7px;
  text-shadow:0 1px 4px rgba(0,0,0,.6);
}
.word-card.bonus-card{animation:bonus-pulse 1s ease-in-out infinite;}
@keyframes bonus-pulse{
  0%,100%{box-shadow:0 0 7px 1px rgba(255,200,30,.35),0 0 0 0 rgba(255,200,30,0);}
  50%{box-shadow:0 0 18px 5px rgba(255,200,30,.7),0 0 0 3px rgba(255,200,30,.15);}
}
.bonus-badge{position:absolute;top:-8px;left:50%;transform:translateX(-50%);background:#ffe060;color:#6a3c00;font-size:.57rem;font-weight:900;padding:1px 7px;border-radius:9px;white-space:nowrap;z-index:8;pointer-events:none;font-family:'Lato',sans-serif;letter-spacing:.3px;box-shadow:0 1px 4px rgba(0,0,0,.25);}

/* MP EVENT BAR */
#mp-event-bar{display:none;background:linear-gradient(90deg,rgba(255,200,30,.18),rgba(255,160,40,.18));border-bottom:1px solid rgba(255,200,30,.35);padding:5px 18px;font-size:.78rem;color:var(--accent);font-weight:700;text-align:center;letter-spacing:.4px;}
#mp-event-bar.on{display:block;}

/* SOFT SPARKLE (solved card ambient) */
.sparkle-container{position:absolute;inset:0;pointer-events:none;overflow:visible;z-index:10;}
.soft-spark{position:absolute;border-radius:50%;pointer-events:none;opacity:0;animation:soft-sp 3s ease-in-out infinite;}
@keyframes soft-sp{0%{opacity:0;transform:scale(0) translateY(0)}45%{opacity:.5;transform:scale(1.1) translateY(-5px)}100%{opacity:0;transform:scale(0) translateY(-11px)}}

/* PIKMIN BURST (correct answer) */
.pkm-p{position:absolute;pointer-events:none;font-size:.85rem;animation:pkm-fly 1s ease-out forwards;z-index:20;}
@keyframes pkm-fly{0%{transform:translate(0,0) scale(1);opacity:1}65%{opacity:1}100%{transform:translate(var(--px),var(--py)) scale(.1);opacity:0}}
.pkm-star{position:absolute;pointer-events:none;width:var(--sz);height:var(--sz);background:var(--col);clip-path:polygon(50% 0%,61% 35%,98% 35%,68% 57%,79% 91%,50% 70%,21% 91%,32% 57%,2% 35%,39% 35%);animation:pkm-starpop .8s ease-out forwards;z-index:20;}
@keyframes pkm-starpop{0%{transform:translate(0,0) scale(0) rotate(0deg);opacity:1}42%{transform:translate(var(--px),var(--py)) scale(1.2) rotate(var(--r));opacity:1}100%{transform:translate(var(--px2),var(--py2)) scale(0) rotate(var(--r2));opacity:0}}
.pkm-ring{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%) scale(0);border:2px solid var(--accent);border-radius:50%;width:10px;height:10px;pointer-events:none;animation:pkm-ring .55s ease-out forwards;z-index:15;opacity:.65;}
@keyframes pkm-ring{to{transform:translate(-50%,-50%) scale(7);opacity:0}}

/* END BUTTON */
.end-section{margin:28px auto;max-width:1500px;padding:0 18px 32px;text-align:center;}
.btn-end{background:linear-gradient(135deg,var(--accent),color-mix(in srgb,var(--accent) 58%,#000));color:#fff;border:none;border-radius:13px;padding:15px 52px;font-family:'Lato',sans-serif;font-weight:700;font-size:.98rem;cursor:pointer;transition:transform .2s,box-shadow .2s;box-shadow:0 3px 14px var(--glow);}
.btn-end:hover{transform:translateY(-3px);box-shadow:0 6px 22px var(--glow);}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.62);z-index:500;align-items:center;justify-content:center;backdrop-filter:blur(4px);}
.modal-overlay.open{display:flex;}
.modal-box{background:var(--modal-bg);border:1.5px solid var(--card-border);border-radius:17px;padding:28px 36px;max-width:530px;width:92%;text-align:center;box-shadow:0 16px 60px var(--shadow);}
.modal-box h2{font-family:'Cinzel Decorative',serif;font-size:1rem;color:var(--accent);margin-bottom:11px;}
[data-lang=de] .modal-box h2{font-family:'UnifrakturMaguntia',cursive;font-size:1.35rem;}
[data-lang=en] .modal-box h2{font-family:'IM Fell English',serif;font-style:italic;}
.modal-box p{color:var(--text-muted);font-size:.87rem;line-height:1.7;margin-bottom:17px;}
.modal-btns{display:flex;gap:9px;justify-content:center;flex-wrap:wrap;}
.btn-primary{background:linear-gradient(135deg,var(--accent),color-mix(in srgb,var(--accent) 62%,#000));color:#fff;border:none;border-radius:9px;padding:9px 21px;font-family:'Lato',sans-serif;font-weight:700;font-size:.87rem;cursor:pointer;transition:transform .15s,box-shadow .15s;}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 4px 14px var(--glow);}
.btn-secondary{background:transparent;border:1.5px solid var(--text-muted);color:var(--text-muted);border-radius:9px;padding:9px 21px;font-family:'Lato',sans-serif;font-size:.87rem;cursor:pointer;transition:border-color .2s,color .2s;}
.btn-secondary:hover{border-color:var(--text);color:var(--text);}
.result-list{text-align:left;margin:9px 0 15px;max-height:290px;overflow-y:auto;padding-right:3px;}
.result-list::-webkit-scrollbar{width:4px;}
.result-list::-webkit-scrollbar-thumb{background:var(--card-border);border-radius:4px;}
.ri{display:flex;align-items:center;gap:7px;padding:4px 7px;border-radius:6px;margin-bottom:3px;font-size:.8rem;background:var(--surface);}
.ri-ico{font-size:1.1rem;}.ri-w{color:var(--accent);font-weight:700;}.ri-m{color:var(--text-muted);margin-left:auto;font-size:.74rem;}.ri-lang{font-size:.85rem;}.ri-pk{font-size:.66rem;color:#c05050;}
.result-score{font-size:.96rem;margin-bottom:6px;}
.result-score strong{color:var(--green);font-size:1.18rem;}

/* RESULT SCORE ANIMATION */
.rsa-row{display:flex;align-items:center;gap:6px;padding:4px 8px;border-radius:7px;font-size:.8rem;font-family:'Lato',sans-serif;opacity:0;transform:translateY(6px);transition:opacity .25s ease-out,transform .25s ease-out;margin-bottom:3px;}
.rsa-row.in{opacity:1;transform:translateY(0);}
.rsa-word{font-weight:700;color:var(--text);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:110px;}
.rsa-pts-base{font-weight:900;font-size:.86rem;color:var(--green);}
.rsa-pts-bonus{font-weight:900;font-size:.86rem;color:#f0a030;}
.rsa-pts-perfect{font-weight:900;font-size:.86rem;color:#cc44ff;}
.rsa-badge{font-size:.6rem;padding:1px 5px;border-radius:5px;font-weight:700;white-space:nowrap;}
.rsa-badge.perfect{background:linear-gradient(90deg,#cc44ff,#8844ff);color:#fff;}
.rsa-badge.bonus{background:linear-gradient(90deg,#f0a030,#e06010);color:#fff;}
.rsa-total-num{display:inline-block;font-size:2.2rem;font-weight:900;font-family:'Lato',sans-serif;color:var(--green);min-width:48px;text-align:right;}
.rsa-total-bump{animation:rsabump .22s ease-out;}
@keyframes rsabump{0%{transform:scale(1.35) translateY(-3px);color:#60e080;}100%{transform:scale(1);color:var(--green);}}

/* MULTI PANEL */
#multi-panel{display:none;position:fixed;inset:0;background:var(--bg);z-index:600;overflow-y:auto;padding:22px 18px;}
#multi-panel.open{display:block;}
.mp-header{display:flex;align-items:center;gap:12px;margin-bottom:18px;}
.mp-header h2{font-family:'Cinzel Decorative',serif;font-size:1.05rem;color:var(--accent);}
.mp-section{background:var(--card);border:1.5px solid var(--card-border);border-radius:13px;padding:18px 22px;margin-bottom:14px;max-width:460px;margin-left:auto;margin-right:auto;}
.mp-section h3{font-size:.86rem;font-weight:700;color:var(--text-muted);margin-bottom:11px;letter-spacing:.8px;text-transform:uppercase;}
.mp-input{width:100%;background:var(--input-bg);border:1.5px solid var(--card-border);border-radius:7px;color:var(--text);font-family:'Lato',sans-serif;font-size:.87rem;padding:7px 11px;outline:none;margin-bottom:7px;transition:border-color .2s;}
.mp-input:focus{border-color:var(--accent);}
.mp-code{font-family:monospace;font-size:1.6rem;font-weight:700;color:var(--accent);letter-spacing:8px;text-align:center;padding:12px;background:var(--surface);border-radius:8px;margin:8px 0;}
.mp-player-list{display:flex;flex-direction:column;gap:5px;margin-top:9px;}
.mp-player{display:flex;align-items:center;gap:8px;padding:6px 9px;background:var(--surface);border-radius:6px;font-size:.82rem;}
.mp-pdot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.mp-pts{margin-left:auto;font-weight:700;color:var(--accent);font-size:.78rem;}
.mp-result-row{display:flex;align-items:center;gap:8px;padding:7px 10px;background:var(--surface);border-radius:7px;margin-bottom:5px;font-size:.82rem;}
.mp-rank{font-weight:700;font-size:.9rem;width:20px;}
/* ターン数選択ボタン */
.turn-sel{background:var(--card);border:1.5px solid var(--card-border);border-radius:8px;color:var(--text-muted);padding:5px 11px;font-size:.76rem;cursor:pointer;font-family:'Lato',sans-serif;transition:all .16s;}
.turn-sel:hover{border-color:var(--accent);color:var(--accent);}
.turn-sel.selected{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:700;}
/* ゲーム終了フラッシュ */
#game-end-flash{display:none;position:fixed;inset:0;z-index:9500;align-items:center;justify-content:center;pointer-events:none;}
#game-end-flash.show{display:flex;}
.game-end-text{font-family:'Fredoka One',cursive;font-size:4.8rem;font-weight:900;
  background:linear-gradient(135deg,#ffd700 0%,#ff6b35 50%,#ff1493 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  filter:drop-shadow(0 0 28px rgba(255,180,0,.8));
  animation:end-pop .6s cubic-bezier(.175,.885,.32,1.4) forwards;opacity:0;}
@keyframes end-pop{
  0%{opacity:0;transform:scale(.2) rotate(-10deg);}
  65%{opacity:1;transform:scale(1.18) rotate(4deg);}
  100%{opacity:1;transform:scale(1) rotate(0deg);}
}

/* CURSOR LABELS */
.cursor-label{position:fixed;pointer-events:none;z-index:7000;display:flex;flex-direction:column;align-items:center;transition:left .06s linear,top .06s linear;}
.cursor-dot{width:11px;height:11px;border-radius:50%;border:2px solid rgba(255,255,255,.7);}
.cursor-name{font-size:.67rem;font-weight:700;border-radius:4px;padding:1px 5px;margin-top:1px;white-space:nowrap;color:#fff;}

/* TURN BANNER */
#turn-banner{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(.7);background:var(--modal-bg);border:2px solid var(--accent);border-radius:14px;padding:14px 30px;font-size:1.05rem;font-weight:700;color:var(--accent);text-align:center;z-index:8000;opacity:0;pointer-events:none;transition:all .4s cubic-bezier(.175,.885,.32,1.275);}
#turn-banner.show{opacity:1;transform:translate(-50%,-50%) scale(1);}

/* NPC操作中オーバーレイ */
#npc-overlay{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.38);
  backdrop-filter:blur(2px);
  z-index:7500;pointer-events:all;
  align-items:center;justify-content:center;
  flex-direction:column;gap:10px;
}
#npc-overlay.show{display:flex;}
.npc-overlay-box{
  background:var(--modal-bg);border:2px solid #40c080;
  border-radius:16px;padding:18px 32px;text-align:center;
  font-family:'Fredoka One',cursive;
  box-shadow:0 8px 32px rgba(0,0,0,.4);
}
.npc-overlay-name{font-size:1.1rem;color:#40c080;margin-bottom:4px;}
.npc-overlay-action{font-size:.88rem;color:var(--text-muted);font-family:'Lato',sans-serif;margin-bottom:10px;letter-spacing:.3px;}
.npc-card-preview{
  display:inline-flex;align-items:center;gap:8px;
  background:var(--card);border:1.5px solid #40c080;border-radius:10px;
  padding:7px 16px;font-size:1.2rem;letter-spacing:1px;
  min-width:140px;justify-content:center;
  font-family:'Lato',sans-serif;font-weight:700;color:var(--text);
}
.npc-typing-dots span{
  display:inline-block;width:7px;height:7px;border-radius:50%;
  background:#40c080;margin:0 2px;
  animation:npc-dot .9s infinite ease-in-out;
}
.npc-typing-dots span:nth-child(2){animation-delay:.15s;}
.npc-typing-dots span:nth-child(3){animation-delay:.30s;}
@keyframes npc-dot{0%,60%,100%{transform:translateY(0);}30%{transform:translateY(-7px);}}
</style>
</head>

function stripAccents(s){return s.normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/ß/g,"ss");}
function norm(s){
  s=s.trim().toLowerCase().replace(/['']/g,"'");
  if(accentFree)s=stripAccents(s);
  return s;
}
const ARTS={it:["il","lo","la","i","gli","le","l'","l","un","uno","una","un'"],de:["der","die","das","ein","eine","einen","einem","einer","des","dem","den"],en:["the","a","an"]};
function checkAnswer(inp,correct){
  const v=norm(inp), c=norm(correct);
  if(v===c)return true;
  for(const a of(ARTS[currentLang]||[])){if(v===a+" "+c||v===a+c)return true;}
  return false;
}

// SE マスターゲイン（0〜1で全SE音量を一括調整）
let seMasterGain=null;
function sed(){
  const ctx=ac();
  if(!seMasterGain){
    seMasterGain=ctx.createGain();
    seMasterGain.gain.value=0.35; // ← ここを変えると全SE音量が変わる
    seMasterGain.connect(ctx.destination);
  }
  return seMasterGain;
}

// Correct answer — Duolingo-style bright ascending chord stab
// マリンバ1打: 基音+倍音の自然減衰（木の温かみ）
function strikeMarimba(ctx,dest,freq,t,vol){
  [[1,.55,.008,.42],[2,.20,.006,.24],[4,.07,.005,.13]].forEach(([harm,v,att,dec])=>{
    const o=ctx.createOscillator(),g=ctx.createGain();
    o.type='sine';o.frequency.value=freq*harm;
    o.connect(g);g.connect(dest);
    g.gain.setValueAtTime(0,t);
    g.gain.linearRampToValueAtTime(vol*v,t+att);
    g.gain.exponentialRampToValueAtTime(0.001,t+dec);
    o.start(t);o.stop(t+dec+.02);
  });
}

// グロッケン1打: 非整数倍音・金属的に長く鳴る
function strikeGlock(ctx,dest,freq,t,vol){
  [[1,.50,.006,.60],[2.76,.26,.005,.34],[5.40,.09,.004,.18]].forEach(([harm,v,att,dec])=>{
    const o=ctx.createOscillator(),g=ctx.createGain();
    o.type='sine';o.frequency.value=freq*harm;
    o.connect(g);g.connect(dest);
    g.gain.setValueAtTime(0,t);
    g.gain.linearRampToValueAtTime(vol*v,t+att);
    g.gain.exponentialRampToValueAtTime(0.001,t+dec);
    o.start(t);o.stop(t+dec+.02);
  });
}

let tickInterval=null;
function startTick(){

    try{
      const ctx=ac(),now=ctx.currentTime;
      // メカニカルなクリック：高域ノイズバースト＋短い金属トーン
      const buf=ctx.createBuffer(1,Math.floor(ctx.sampleRate*.018),ctx.sampleRate);
      const d=buf.getChannelData(0);

      const src=ctx.createBufferSource(),flt=ctx.createBiquadFilter(),gn=ctx.createGain();
      flt.type='highpass';flt.frequency.value=4000;
      src.buffer=buf;src.connect(flt);flt.connect(gn);gn.connect(sed());
      gn.gain.setValueAtTime(.18,now);gn.gain.exponentialRampToValueAtTime(.001,now+.018);
      src.start(now);src.stop(now+.02);
      // 金属トーン：2音で「カチッ」感
      [[2800,.0,.012],[4200,.006,.009]].forEach(([f,dt,dec])=>{
        const o=ctx.createOscillator(),g=ctx.createGain();

        o.connect(g);g.connect(sed());
        g.gain.setValueAtTime(.09,now+dt);g.gain.exponentialRampToValueAtTime(.001,now+dt+dec);
        o.start(now+dt);o.stop(now+dt+dec+.005);

}

function playPronunciation(text,lang){
  if(!window.speechSynthesis)return;
  window.speechSynthesis.cancel();
  const doSpeak=()=>{
    const utt=new SpeechSynthesisUtterance(text);
    utt.lang=lang||'it-IT';
    utt.rate=0.85;utt.pitch=1.05;utt.volume=0.67;
    utt.onstart=()=>bgmDuck&&bgmDuck(0.08,99999);
    utt.onend=utt.onerror=()=>onModalClose&&onModalClose();
    // 言語に合う声を探して設定
    const voices=window.speechSynthesis.getVoices();
    const voice=voices.find(v=>v.lang.startsWith(lang?.split('-')[0]||'it'));
    if(voice)utt.voice=voice;
    window.speechSynthesis.speak(utt);
  };
  setTimeout(doSpeak,80);
}

function getTrivia(word){

  for(const k in TRIVIA){if(norm(k)===key)return TRIVIA[k];}

}

const LANG_FLAGS={it:'🇮🇹',de:'🇩🇪',en:'🇬🇧'};
const LANG_NAMES={it:'イタリア語',de:'ドイツ語',en:'英語'};
const EVENT_TYPES=['lang','card','both'];

function generateBonusEvent(){
  if(!MP.active)return;
  const type=EVENT_TYPES[Math.floor(Math.random()*EVENT_TYPES.length)];
  const langs=['it','de','en'];
  const lang=langs[Math.floor(Math.random()*langs.length)];
  // Pick a random unsolved card from current cat for card bonus
  const catData=WORD_DATA[currentCat];
  const solSet=getSolved(currentCat);
  const unsolvedIdxs=catData.words.map((_,i)=>i).filter(i=>!solSet.has(i));
  const bonusIdx=unsolvedIdxs.length>0?unsolvedIdxs[Math.floor(Math.random()*unsolvedIdxs.length)]:null;

  MP.currentEvent={
    type,lang,
    langPts:1,
    cardPts:2,
    bonusIdx,
    bonusCat:currentCat,
  };

  let msg='';
  if(type==='lang')msg=`${LANG_FLAGS[lang]} 今ターン：${LANG_NAMES[lang]}で答えると +1pt！`;
  else if(type==='card'&&bonusIdx!==null)msg=`✨ 今ターン：光っているカードを答えると +2pt！`;
  else if(type==='both'&&bonusIdx!==null)msg=`🌟 今ターン：${LANG_NAMES[lang]}+光カード両方で最大 +3pt！`;
  else msg=`${LANG_FLAGS[lang]} 今ターン：${LANG_NAMES[lang]}で答えると +1pt！`;

  document.getElementById('mp-event-bar').textContent=msg;
  document.getElementById('mp-event-bar').classList.add('on');

  mpBroadcast({type:'event',event:MP.currentEvent,msg});
  // Re-render grid to show bonus card glow
  renderGrid(currentCat);
}

const MILESTONE_IMGS={
  it:['Bravo','Fantastico','Magnifico','Leggendario_it'],
  de:['Super','Klasse','Fantastisch','Legendär'],
  en:['Great','Awesome','Amazing','Legendary_en'],
};
const MILESTONE_TXT={
  it:['Bravo!','Fantastico!','Magnifico!','Leggendario!'],
  de:['Super!','Klasse!','Fantastisch!','Legendär!'],
  en:['Great!','Awesome!','Amazing!','Legendary!'],
};
function showMilestone(){
  const el=document.getElementById('milestone-msg');
  const imgs=MILESTONE_IMGS[currentLang]||MILESTONE_IMGS.it;
  const txts=MILESTONE_TXT[currentLang]||MILESTONE_TXT.it;
  const pick=Math.floor(Math.random()*imgs.length);
  const span=el.querySelector('.ms-text');
  el.querySelectorAll('img').forEach(i=>i.remove());
  // Try image first
  const img=document.createElement('img');
  img.alt=txts[pick];
  img.onload=()=>{span.style.display='none';img.style.display='block';};
  img.onerror=()=>{span.textContent=txts[pick];span.style.display='';img.remove();};
  img.style.display='none';
  img.src=`assets/img/${imgs[pick]}.png`;
  el.appendChild(img);
  span.textContent=txts[pick];span.style.display='';
  el.classList.add('show');playMilestone();
  setTimeout(()=>{el.classList.remove('show');span.style.display='none';},2800);
}

// ================================================================
// PEEK (5秒答え表示)
// ================================================================
const PEEK_DUR=5000;
let peekTimers={};
function handlePeek(btn,word,idx,cat,card){
  const key=`${cat}_${idx}`;
  if(peekTimers[key])return;
  getPeeked(cat).add(idx);
  btn.classList.add('peeking');
  const target=word[currentLang]||word.it;
  const rv=document.createElement('div');rv.className='peek-reveal';rv.textContent=target;card.appendChild(rv);
  const tb=document.createElement('div');tb.className='peek-timer';tb.style.width='100%';card.appendChild(tb);
  requestAnimationFrame(()=>{tb.style.transition=`width ${PEEK_DUR}ms linear`;tb.style.width='0%';});
  const inp=card.querySelector('.card-input');
  if(inp){inp.style.borderColor='#c86060';inp.focus();}
  awardPts(1,'peek');
  startTick(); // チクタク開始
  peekTimers[key]=setTimeout(()=>{
    rv.remove();tb.remove();btn.classList.remove('peeking');
    delete peekTimers[key];
    if(inp)inp.style.borderColor='';
    stopTick(); // チクタク停止
  },PEEK_DUR);
}

// ================================================================
// TRIVIA POPUP — 3種ランダム表示
// ================================================================
const TRIVIA_ICONS=['📖','🎓','💬'];
const TRIVIA_LABELS=['語形変化','語源・派生','使い方'];
let triviaOpenCard=null;
function handleTrivia(btn,word,card){
  const trivs=getTrivia(word[currentLang]||word.it)||getTrivia(word.it)||getTrivia(word.de)||getTrivia(word.en);
  if(!trivs)return;
  if(triviaOpenCard===card){
    closeTrivia(card);triviaOpenCard=null;return;
  }
  if(triviaOpenCard)closeTrivia(triviaOpenCard);
  triviaOpenCard=card;
  btn.classList.add('active');
  // Pick up to 3 random distinct entries
  const shuffled=[...trivs].sort(()=>Math.random()-.5).slice(0,Math.min(3,trivs.length));
  const pop=document.createElement('div');pop.className='trivia-popup';
  pop.innerHTML=`<b>💡 豆知識</b>`+shuffled.map((t,i)=>{
    const icon=TRIVIA_ICONS[i%3];
    return `<div style="margin-top:3px"><span style="color:var(--accent);margin-right:3px">${icon}</span>${t}</div>`;
  }).join('');
  card.appendChild(pop);
}
function closeTrivia(card){
  card.querySelector('.trivia-popup')?.remove();
  card.querySelector('.trivia-btn')?.classList.remove('active');
}

// RENDER

function renderGrid(cat){
  const data=WORD_DATA[cat];
  document.getElementById('category-title').textContent=data.title[currentLang]||data.title.it;
  const grid=document.getElementById('word-grid');grid.innerHTML="";
  const solSet=getSolved(cat);
  data.words.forEach((w,idx)=>{
    const isSolved=solSet.has(idx);
    const target=w[currentLang]||w.it;
    const rawHasTv=!!(getTrivia(target)||getTrivia(w.it)||getTrivia(w.de)||getTrivia(w.en));
    // TRIVIAデータがあるクリア済みカードには全部ボタンを表示
    const hasTv=isSolved&&rawHasTv;
    const card=document.createElement('div');
    card.className='word-card'+(isSolved?' solved':'');
    card.dataset.idx=idx;
    if(!isSolved) card.dataset.hint=makeHint(target);
    const HOURGLASS=`<svg viewBox="0 0 24 24" width="12" height="12" fill="currentColor"><path d="M6 2h12v4l-4 4 4 4v4H6v-4l4-4-4-4V2zm2 1v2.586l4 4 4-4V3H8zm8 14v-2.586l-4-4-4 4V17h8z"/></svg>`;
    card.innerHTML=`
      <div class="sparkle-container"></div>
      ${isSolved&&hasTv?`<button class="trivia-btn" title="豆知識">💡</button>`:''}
      ${!isSolved?`<button class="peek-btn" title="5秒だけ答えを見る">${HOURGLASS}</button>`:''}
      <div class="card-icon">${w.icon}</div>
      <div class="card-ja">${w.ja}</div>
      <div class="card-answer">${isSolved?target:''}</div>
      ${isSolved?'':`<input class="card-input" type="text" placeholder="…" autocomplete="off" spellcheck="false">`}
    `;
    addSoftSparkles(card);
    if(isSolved){
      // クリア済みカードをクリックで発音
      const langVoiceMap={it:'it-IT',de:'de-DE',en:'en-GB'};
      card.style.cursor='pointer';
      card.addEventListener('click',e=>{
        if(e.target.classList.contains('trivia-btn'))return;
        const voiceLang=langVoiceMap[currentLang]||'it-IT';
        playPronunciation(target,voiceLang);
        // small visual feedback
        card.style.transform='scale(.97)';
        setTimeout(()=>card.style.transform='',120);
      });
    }
    // trivia — SOLVED cards only
    if(isSolved&&hasTv){
      const tb=card.querySelector('.trivia-btn');
      tb.addEventListener('click',e=>{e.stopPropagation();playClick();handleTrivia(tb,w,card);});
      tb.addEventListener('touchstart',e=>{e.stopPropagation();handleTrivia(tb,w,card);},{passive:true});
    }
    // hover hint (shift) + close trivia on click elsewhere
    // Shiftキー状態をグローバル追跡して確実に検知
    card.addEventListener('mouseenter',()=>{
      if(shiftHeld&&!isSolved) showShiftHint(card,target,cat,idx);
    });
    card.addEventListener('mousemove',()=>{
      if(shiftHeld&&!isSolved&&!card.querySelector('.shift-hint')) showShiftHint(card,target,cat,idx);
    });
    card.addEventListener('mouseleave',()=>card.querySelector('.shift-hint')?.remove());
    // peek
    if(!isSolved){
      const peekBtn=card.querySelector('.peek-btn');
      peekBtn?.addEventListener('click',e=>{e.stopPropagation();playClick();handlePeek(peekBtn,w,idx,cat,card);});
      // input
      const inp=card.querySelector('.card-input');
      inp.addEventListener('keydown',e=>{
        if(e.key==='Enter')tryAnswer(inp,w,idx,card,cat);
        else if(e.key.length===1)playTyping();
      });
      inp.addEventListener('input',()=>{
        if(checkAnswer(inp.value,target))tryAnswer(inp,w,idx,card,cat);
      });
      // mp: track focused card on touch
      inp.addEventListener('focus',()=>mpBroadcast({type:'card-focus',idx,cat}));
      inp.addEventListener('blur',()=>mpBroadcast({type:'card-blur',idx,cat}));
      // turn check
      inp.addEventListener('keydown',e=>{if(MP.active&&!isMyTurn()){e.preventDefault();}});
      // apply bonus card glow if this idx matches current bonus event
      if(MP.active&&MP.currentEvent&&(MP.currentEvent.type==='card'||MP.currentEvent.type==='both')){
        if(MP.currentEvent.bonusIdx===idx&&MP.currentEvent.bonusCat===cat){
          card.classList.add('bonus-card');
          const badge=document.createElement('div');badge.className='bonus-badge';
          badge.textContent=`✨ ボーナス +${MP.currentEvent.cardPts}pt`;
          card.appendChild(badge);
        }
      }
    }
    grid.appendChild(card);
  });
}

function tryAnswer(inp,word,idx,card,cat){
  const target=word[currentLang]||word.it;
  if(!checkAnswer(inp.value,target)){
    // 他言語の答えかチェック
    const otherLangs=[['it','イタリア語'],['de','ドイツ語'],['en','英語']].filter(([l])=>l!==currentLang);
    let langMatch=null;
    for(const [l,name] of otherLangs){
      const alt=word[l]||'';
      if(alt&&checkAnswer(inp.value,alt)){langMatch=name;break;}
    }
    inp.classList.add('wrong');setTimeout(()=>inp.classList.remove('wrong'),320);
    playWrong();
    if(langMatch)showWrongLangHint(card,langMatch);
    // 誤答カウント
    const wk=`${cat}_${idx}`;wrongCount[wk]=(wrongCount[wk]||0)+1;
    return;
  }
  const key=`${cat}_${idx}`;
  if(peekTimers[key]){clearTimeout(peekTimers[key]);delete peekTimers[key];card.querySelector('.peek-reveal')?.remove();card.querySelector('.peek-timer')?.remove();stopTick();}
  getSolved(cat).add(idx);
  getSolvedLang(cat)[idx]=currentLang;
  card.classList.add('solved');
  card.querySelector('.card-answer').textContent=target;
  inp.disabled=true;
  card.querySelector('.peek-btn')?.remove();
  card.querySelector('.trivia-btn')?.remove();

  const wasPeeked=getPeeked(cat).has(idx);
  const wasHinted=getHinted(cat).has(idx);
  const wasWrong=(wrongCount[`${cat}_${idx}`]||0)>0;
  const isPerfect=!wasPeeked&&!wasHinted&&!wasWrong;
  let pts=wasPeeked?1:wasHinted?2:5;
  if(isPerfect)pts*=2; // パーフェクト×2

  // Check bonus events (multiplay)
  let bonusPts=0;
  if(MP.active&&MP.currentEvent){
    const ev=MP.currentEvent;
    if(ev.type==='lang'&&currentLang===ev.lang){bonusPts+=ev.langPts||1;}
    if((ev.type==='card'||ev.type==='both')&&card.classList.contains('bonus-card')){bonusPts+=ev.cardPts||2;}
    if(ev.type==='both'&&currentLang===ev.lang){bonusPts+=ev.langPts||1;}
  }

  if(MP.active){
    const me=MP.players[MP.myId];
    if(me){
      if(!me.langPts)me.langPts={it:0,de:0,en:0};
      me.langPts[currentLang]=(me.langPts[currentLang]||0)+pts+bonusPts;
    }
  }

  // 履歴記録
  solvedHistory.push({pts,bonusPts,isPerfect,word,lang:currentLang,cat,idx});

  spawnPikmin(card);addSoftSparkles(card);
  playCorrect(pts+bonusPts);
  vibrate(bonusPts>0?[30,20,60]:isPerfect?[20,10,20,10,40]:40);

  if(ptsMode) showPtsPopup(pts,bonusPts,isPerfect);

  if(bonusPts>0){
    awardPts(pts,'correct');
    awardPts(bonusPts,'bonus');
    if(ptsMode) showBonus(bonusPts,card);
    card.classList.remove('bonus-card');
    card.querySelector('.bonus-badge')?.remove();
  } else {
    awardPts(pts,'correct');
  }

  updateScore();
  const s=countSolved();
  if(s>0&&s%5===0&&Math.floor(s/5)>milestoneCount){milestoneCount=Math.floor(s/5);setTimeout(showMilestone,350);}
  mpBroadcast({type:'solved',cat,idx,lang:currentLang,pts,bonusPts,isPerfect});

  // 正解後：発音リスナーをカードに付与（renderGrid呼び直しなしで動作させる）
  const langVoiceMap={it:'it-IT',de:'de-DE',en:'en-GB'};
  card.style.cursor='pointer';
  card.addEventListener('pointerup',e=>{
    if(e.target.closest('.trivia-btn,.trivia-popup'))return;
    playPronunciation(target,langVoiceMap[currentLang]||'it-IT');
    card.style.transform='scale(.97)';
    setTimeout(()=>card.style.transform='',120);
  });
  // triviaリスナーも正解直後に付与
  const trivData=getTrivia(target)||getTrivia(word.it)||getTrivia(word.de)||getTrivia(word.en);
  if(trivData){
    const tbNew=document.createElement('button');
    tbNew.className='trivia-btn';tbNew.title='豆知識';tbNew.textContent='💡';
    card.insertBefore(tbNew,card.firstChild);
    tbNew.addEventListener('click',e=>{e.stopPropagation();playClick();handleTrivia(tbNew,word,card);});
  }

  // ターン表示はポイント表示の後
  if(MP.active){
    const popHold=ptsMode?(bonusPts>0?2050:isPerfect?1850:1450):200;
    setTimeout(()=>nextTurn(), popHold);
  }
}

let ptsPopupTimer=null;
function showPtsPopup(pts,bonusPts,isPerfect){
  if(ptsPopupTimer)clearTimeout(ptsPopupTimer);
  const el=document.getElementById('pts-popup');
  el.classList.remove('show');

  // Build content
  let html='';
  if(isPerfect){
    const half=pts/2;
    html+=`<span class="pp-perfect">✨ PERFECT × 2</span>`;
    html+=`<span class="pp-base">+${pts}pt</span>`;
  } else {
    html+=`<span class="pp-base">+${pts}pt</span>`;
  }
  if(bonusPts>0){
    html+=`<span class="pp-bonus">🌟 ボーナス +${bonusPts}pt</span>`;
  }
  el.innerHTML=html;

  // pop in — small delay so it appears just after pikmin burst
  requestAnimationFrame(()=>requestAnimationFrame(()=>el.classList.add('show')));

  const holdMs=bonusPts>0?2000:isPerfect?1800:1400;
  ptsPopupTimer=setTimeout(()=>{
    el.classList.remove('show');
  },holdMs);
}
let wrongLangTimer=null;
function showWrongLangHint(card,langName){
  if(wrongLangTimer)clearTimeout(wrongLangTimer);
  card.querySelector('.wrong-lang-hint')?.remove();
  const overlay=document.createElement('div');
  overlay.className='wrong-lang-hint';
  overlay.innerHTML=`<span>それは${langName}かも？🤔</span>`;
  card.appendChild(overlay);
  requestAnimationFrame(()=>requestAnimationFrame(()=>overlay.classList.add('show')));
  wrongLangTimer=setTimeout(()=>{
    overlay.classList.remove('show');
    setTimeout(()=>overlay.remove(),400);
  },2200);
}

const FLAG={it:'🇮🇹',de:'🇩🇪',en:'🇬🇧'};
// ================================================================
// RESULT — animated score reveal
// ================================================================
function showResult(){
  const all=[];
  for(const cat in WORD_DATA)WORD_DATA[cat].words.forEach((w,idx)=>all.push({...w,cat,idx}));
  const total=all.length,s=countSolved();
  const pks=[...Object.entries(peeked)].reduce((a,[c,st])=>a+([...st].filter(i=>getSolved(c).has(i)).length),0);
  let html=LOCALE[currentLang].resultText(s,total);
  if(pks>0)html+=`<br><span style="font-size:.79rem;color:var(--text-muted)">（うち ⏳ 見て正解: ${pks}問）</span>`;
  document.getElementById('result-text').innerHTML=html;

  // ── word list (scrollable) ──
  const list=document.getElementById('result-list');list.innerHTML='';
  const sw=all.filter(w=>getSolved(w.cat).has(w.idx));
  if(!sw.length){list.innerHTML='<p style="color:var(--text-muted);text-align:center;padding:12px">—</p>';}
  else{
    const hdr=document.createElement('div');
    hdr.style.cssText='font-size:.72rem;color:var(--text-muted);margin-bottom:6px;font-weight:700;';
    hdr.textContent='✅ 正解した単語';list.appendChild(hdr);
    sw.forEach(w=>{
      const item=document.createElement('div');item.className='ri';
      const lg=(getSolvedLang(w.cat)||{})[w.idx]||currentLang;
      const wk=getPeeked(w.cat).has(w.idx);
      item.innerHTML=`<span class="ri-ico">${w.icon}</span><span class="ri-w">${w[lg]||w.it}</span><span class="ri-lang">${FLAG[lg]||''}</span>${wk?'<span class="ri-pk">⏳見た</span>':''}<span class="ri-m">${w.ja}</span>`;
      list.appendChild(item);
    });
  }

  // ── MP scores ──
  if(MP.active){
    const mr=document.getElementById('mp-result-list');mr.innerHTML='';
    const players=Object.values(MP.players).sort((a,b)=>b.pts-a.pts);
    players.forEach((p,i)=>{
      const row=document.createElement('div');row.className='mp-result-row';
      const lp=p.langPts||{it:0,de:0,en:0};
      const langBreak=`<div style="font-size:.68rem;color:var(--text-muted);margin-top:2px">🇮🇹 ${lp.it||0}pt　🇩🇪 ${lp.de||0}pt　🇬🇧 ${lp.en||0}pt</div>`;
      row.innerHTML=`<span class="mp-rank">${['🥇','🥈','🥉'][i]||i+1}</span><span class="mp-pdot" style="background:${p.color}"></span><div><div>${p.name}</div>${langBreak}</div><span class="mp-pts" style="margin-left:auto;align-self:flex-start">${p.pts}pt</span>`;
      row.style.alignItems='flex-start';
      mr.appendChild(row);
    });
    document.getElementById('mps-result').style.display='block';
  }

  document.getElementById('modal-result').classList.add('open');

  // ── アニメーション開始 ──
  if(solvedHistory.length>0){
    const animEl=document.getElementById('result-score-anim');
    const feedEl=document.getElementById('rsa-feed');
    const totalEl=document.getElementById('rsa-total');
    animEl.style.display='block';
    feedEl.innerHTML='';
    totalEl.textContent='0';
    runScoreAnimation(feedEl,totalEl,0,0);
  }
}

function resetAll(){
  solved={};peeked={};hinted={};solvedLang={};milestoneCount=0;
  wrongCount={};solvedHistory={};solvedHistory=[];soloPts=0;
  for(const k in peekTimers)clearTimeout(peekTimers[k]);
  peekTimers={};
  // reset result anim
  const animEl=document.getElementById('result-score-anim');
  if(animEl)animEl.style.display='none';
  // reset pts popup
  if(ptsPopupTimer)clearTimeout(ptsPopupTimer);
  document.getElementById('pts-popup').classList.remove('show');
  // reset MP pts
  if(MP.active){
    MP.myPts=0;
    for(const id in MP.players){MP.players[id].pts=0;MP.players[id].langPts={it:0,de:0,en:0};}
    updateScorebar();
  }
  updateScore();renderGrid(currentCat);
}

function genCode(){return Math.random().toString(36).substr(2,4).toUpperCase();}
function genId(){return Math.random().toString(36).substr(2,8);}
function getMyName(){
  const n=document.getElementById('mp-name').value.trim();
  return n||GYM_NAMES[Math.floor(Math.random()*GYM_NAMES.length)];
}
function getMyColor(){
  const idx=Object.keys(MP.players).length%PLAYER_COLORS.length;
  return PLAYER_COLORS[idx];
}

// Points tracking
function awardPts(delta,reason){
  if(MP.active){
    MP.myPts+=delta;
    const me=MP.players[MP.myId];
    if(me){me.pts=MP.myPts;}
    updateScorebar();
    mpBroadcast({type:'pts-update',id:MP.myId,pts:MP.myPts,langPts:me?.langPts});
  } else {
    if(!ptsMode)return;
    soloPts=Math.max(0,soloPts+delta);
    updateScorebar();
  }
}

function updateScorebar(){
  const sb=document.getElementById('scorebar');
  if(!MP.active){
    if(!ptsMode){sb.classList.remove('on');return;}
    sb.classList.add('on','solo');sb.classList.remove('mp');
    const ti=document.getElementById('turn-label');ti.textContent='';
    document.getElementById('sb-players').innerHTML=
      `<span class="sb-my-label">あなたのポイント</span><span class="sb-my-pts">${soloPts}<small style="font-size:.6em;margin-left:2px">pt</small></span>`;
    return;
  }
  sb.classList.add('on');sb.classList.remove('solo');sb.classList.add('mp');
  const ti=document.getElementById('turn-label');
  const tp=MP.players[MP.turnOrder[MP.currentTurnIdx]];
  ti.textContent=tp?`${tp.name}のターン`:'';
  ti.style.color=tp?.color||'var(--accent)';
  const sbp=document.getElementById('sb-players');sbp.innerHTML='';
  MP.turnOrder.forEach(id=>{
    const p=MP.players[id];if(!p)return;
    const isMe=id===MP.myId;
    const sp=document.createElement('span');
    sp.className=isMe?'sb-player-me':'sb-player-other';
    sp.innerHTML=`<span class="sb-dot" style="background:${p.color}"></span>${isMe?'<b>'+p.name+'</b>':p.name}: <span class="sb-pt-val">${p.pts||0}</span>pt`;
    sbp.appendChild(sp);
  });
}

function isMyTurn(){
  if(!MP.active)return true;
  return MP.turnOrder[MP.currentTurnIdx]===MP.myId;
}

function nextTurn(){
  const prevIdx=MP.currentTurnIdx;
  MP.currentTurnIdx=(MP.currentTurnIdx+1)%MP.turnOrder.length;
  // 全員1周したらroundCount++
  if(MP.currentTurnIdx===0){
    MP.roundCount=(MP.roundCount||0)+1;
    // ターン数チェック
    if(MP.turnLimit>0&&MP.roundCount>=MP.turnLimit){
      mpBroadcast({type:'turn-change',idx:MP.currentTurnIdx});
      showGameEnd();
      return;
    }
  }
  mpBroadcast({type:'turn-change',idx:MP.currentTurnIdx});
  showTurnBanner();updateScorebar();
  // Generate new bonus event each turn
  setTimeout(generateBonusEvent,600);
  // NPC対戦: NPCのターンなら直接起動
  if(MP.players[NPC_ID]){
    clearTimeout(npcTimer);
    if(MP.turnOrder[MP.currentTurnIdx]===NPC_ID){
      setTimeout(npcThink,600);
    }
  }
}

function showTurnBanner(){
  const tp=MP.players[MP.turnOrder[MP.currentTurnIdx]];if(!tp)return;
  const b=document.getElementById('turn-banner');
  b.textContent=MP.turnOrder[MP.currentTurnIdx]===MP.myId?'あなたのターン！':`${tp.name}のターン`;
  b.style.color=tp.color;b.style.borderColor=tp.color;

// BroadcastChannel (same device) + PeerJS (across devices)
function mpBroadcast(msg){
  if(!MP.active)return;
  msg.from=MP.myId;
  if(MP.channel)try{MP.channel.postMessage(msg);}catch(e){}
  Object.values(MP.conns).forEach(c=>{try{c.send(msg);}catch(e){}});
}

function handleMsg(msg){
  if(msg.from===MP.myId)return;
  if(msg.type==='join'){
    MP.players[msg.id]={name:msg.name,color:msg.color,pts:0,langPts:{it:0,de:0,en:0}};
    if(!MP.turnOrder.includes(msg.id))MP.turnOrder.push(msg.id);
    renderPlayerList();updateScorebar();
    // reply with state
    if(MP.isHost)mpBroadcast({type:'state',players:MP.players,turnOrder:MP.turnOrder,turnIdx:MP.currentTurnIdx,solved:serializeSolved()});
  }
  if(msg.type==='state'){
    msg.players&&Object.assign(MP.players,msg.players);
    msg.turnOrder&&(MP.turnOrder=msg.turnOrder);
    if(msg.turnIdx!=null)MP.currentTurnIdx=msg.turnIdx;
    if(msg.solved)deserializeSolved(msg.solved);
    renderPlayerList();updateScorebar();renderGrid(currentCat);
  }
  if(msg.type==='solved'){
    getSolved(msg.cat).add(msg.idx);
    getSolvedLang(msg.cat)[msg.idx]=msg.lang;
    // track lang pts for the sender
    const sender=MP.players[msg.from];
    if(sender){
      if(!sender.langPts)sender.langPts={it:0,de:0,en:0};
      sender.langPts[msg.lang]=(sender.langPts[msg.lang]||0)+(msg.pts||0)+(msg.bonusPts||0);
    }
    updateScore();renderGrid(currentCat);
  }
  if(msg.type==='event'){
    MP.currentEvent=msg.event;
    document.getElementById('mp-event-bar').textContent=msg.msg;
    document.getElementById('mp-event-bar').classList.add('on');
    renderGrid(currentCat);
  }
  if(msg.type==='cursor')updateCursorLabel(msg.id,msg.x,msg.y);
  if(msg.type==='card-focus')highlightCard(msg.from,msg.idx,msg.cat);
  if(msg.type==='card-blur')highlightCard(msg.from,null,null);
  if(msg.type==='turn-change'){MP.currentTurnIdx=msg.idx;showTurnBanner();updateScorebar();}
  if(msg.type==='pts-update'){
    const p=MP.players[msg.id];
    if(p){p.pts=msg.pts;if(msg.langPts)p.langPts=msg.langPts;}
    updateScorebar();
  }
  if(msg.type==='leave'){
    removeCursorLabel(msg.id);
    delete MP.players[msg.id];
    MP.turnOrder=MP.turnOrder.filter(i=>i!==msg.id);
    renderPlayerList();updateScorebar();
  }
  if(msg.type==='game-start'){
    // Reset all game state for everyone
    solved={};peeked={};hinted={};solvedLang={};milestoneCount=0;
    for(const k in peekTimers)clearTimeout(peekTimers[k]);
    peekTimers={};
    // Reset player pts
    for(const id in MP.players){MP.players[id].pts=0;MP.players[id].langPts={it:0,de:0,en:0};}
    MP.myPts=0;
    document.getElementById('multi-panel').classList.remove('open');
    updateScore();renderGrid(currentCat);
    updateScorebar();showTurnBanner();
    setTimeout(generateBonusEvent,800);
  }
  // NPCのターンなら思考開始
  if(msg.type==='turn-change'||msg.type==='game-start'){
    clearTimeout(npcTimer);
    setTimeout(npcThink,400);
  }
}

function serializeSolved(){
  const out={};
  for(const c in solved)out[c]=[...solved[c]];
  return out;
}
function deserializeSolved(data){
  for(const c in data){if(!solved[c])solved[c]=new Set();data[c].forEach(i=>solved[c].add(i));}
}

function setupBC(code){
  if(MP.channel)MP.channel.close();
  MP.channel=new BroadcastChannel('ciaotipo_'+code);
  MP.channel.onmessage=e=>handleMsg(e.data);
}

// PeerJS setup
function setupPeer(code,asHost){
  if(!window.Peer)return;
  const peerId='ct_'+code+(asHost?'_host':'_'+MP.myId);
  MP.peer=new Peer(peerId,{debug:0});
  MP.peer.on('open',id=>{
    if(!asHost){
      const conn=MP.peer.connect('ct_'+code+'_host');
      conn.on('open',()=>{
        MP.conns['host']=conn;
        conn.send({from:MP.myId,type:'join',id:MP.myId,name:MP.myName,color:MP.myColor});
      });
      conn.on('data',d=>handleMsg(d));
    }
  });
  MP.peer.on('connection',conn=>{
    conn.on('open',()=>{MP.conns[conn.peer]=conn;});
    conn.on('data',d=>{handleMsg(d);mpBroadcast(d);}); // relay
  });
  MP.peer.on('error',()=>{}); // ignore peer errors silently
}

function mkDrum(k,s,h){return{k,s,h};}
const D0=mkDrum(0,0,0),DK=mkDrum(1,0,0),DS=mkDrum(0,1,0),
      DH=mkDrum(0,0,1),DKH=mkDrum(1,0,1),DSH=mkDrum(0,1,1);

const DRUM=[
  // セクションA — シンプル、キック拍1,ハイハット全拍
  [DKH,DH,DSH,DH],[DKH,DH,DSH,DH],[DKH,DH,DSH,DH],[DKH,DH,DSH,DH],
  [DKH,DH,DSH,DH],[DKH,DH,DSH,DH],[DKH,DH,DSH,DH],[DK ,DH,DS ,DH],

  [DKH,DH,DSH,DH],[DKH,DH,DSH,DKH],[DKH,DH,DSH,DH],[DKH,DKH,DSH,DH],
  [DKH,DH,DSH,DH],[DKH,DH,DSH,DKH],[DKH,DH,DSH,DH],[DK ,DH,DS ,DH ],
  // セクションC — ハイハット間引き、静か
  [DK ,D0,DS ,D0],[DK ,D0,DS ,D0],[DK ,D0,DS ,D0],[DK ,D0,DS ,D0],
  [DK ,DH,DS ,DH],[DK ,DH,DS ,DH],[DK ,DH,DS ,DH],[DK ,D0,DS ,D0],
  // セクションD — 全部入り、盛り上がり
  [DKH,DH,DSH,DH],[DKH,DH,DSH,DKH],[DKH,DH,DSH,DH],[DKH,DKH,DSH,DH],
  [DKH,DH,DSH,DH],[DKH,DH,DSH,DKH],[DKH,DKH,DSH,DH],[DKH,DH,DSH,DH],

// ── 音を鳴らすユーティリティ ──
function bgmXylo(freq,t,dur,vol){
  // 木琴: triangle + 高調波でコツコツ感
  const ctx=bgmCtx;
  [1,2,3].forEach((harm,i)=>{
    const vols=[vol,vol*.25,vol*.08];
    const o=ctx.createOscillator(),g=ctx.createGain();
    o.type='triangle';o.frequency.value=freq*harm;
    o.connect(g);g.connect(bgmGain);
    g.gain.setValueAtTime(0,t);
    g.gain.linearRampToValueAtTime(vols[i],t+0.008);
    g.gain.exponentialRampToValueAtTime(0.001,t+dur*(1-i*0.25));
    o.start(t);o.stop(t+dur+0.02);
  });
}

function bgmKick(t){
  const ctx=bgmCtx;
  const o=ctx.createOscillator(),g=ctx.createGain();
  o.type='sine';
  o.frequency.setValueAtTime(140,t);
  o.frequency.exponentialRampToValueAtTime(40,t+0.12);
  o.connect(g);g.connect(bgmGain);
  g.gain.setValueAtTime(0.55,t);
  g.gain.exponentialRampToValueAtTime(0.001,t+0.18);
  o.start(t);o.stop(t+0.2);
}

function bgmSnare(t){
  const ctx=bgmCtx;
  // noise
  const buf=ctx.createBuffer(1,Math.floor(ctx.sampleRate*0.12),ctx.sampleRate);
  const d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1);
  const src=ctx.createBufferSource(),flt=ctx.createBiquadFilter(),g=ctx.createGain();
  flt.type='bandpass';flt.frequency.value=2200;flt.Q.value=0.8;
  src.buffer=buf;src.connect(flt);flt.connect(g);g.connect(bgmGain);
  g.gain.setValueAtTime(0.22,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.1);
  src.start(t);src.stop(t+0.13);
  // body tone
  const o=ctx.createOscillator(),g2=ctx.createGain();
  o.type='triangle';o.frequency.value=200;
  o.connect(g2);g2.connect(bgmGain);
  g2.gain.setValueAtTime(0.08,t);g2.gain.exponentialRampToValueAtTime(0.001,t+0.06);
  o.start(t);o.stop(t+0.08);
}

function bgmHihat(t,open=false){
  const ctx=bgmCtx;
  const buf=ctx.createBuffer(1,Math.floor(ctx.sampleRate*(open?0.09:0.04)),ctx.sampleRate);
  const d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1);
  const src=ctx.createBufferSource(),flt=ctx.createBiquadFilter(),g=ctx.createGain();
  flt.type='highpass';flt.frequency.value=7000;
  src.buffer=buf;src.connect(flt);flt.connect(g);g.connect(bgmGain);
  const dur=open?0.08:0.035;
  g.gain.setValueAtTime(0.1,t);g.gain.exponentialRampToValueAtTime(0.001,t+dur);
  src.start(t);src.stop(t+dur+0.01);
}

// ── 1ループ分スケジュール ──
function bgmScheduleLoop(loopStartTime){
  if(!bgmRunning||!bgmCtx||!bgmGain)return;
  for(let bar=0;bar<LOOP_BARS;bar++){
    const barT=loopStartTime+bar*BAR;
    const xRow=XMELO[bar];
    const dRow=DRUM[bar];
    for(let beat=0;beat<4;beat++){
      const beatT=barT+beat*BEAT;
      // 木琴
      const freq=xRow[beat];
      if(freq){
        bgmXylo(freq,beatT,BEAT*0.45,0.065);
      }
      // ドラム
      const dp=dRow[beat];
      if(dp.k) bgmKick(beatT);
      if(dp.s) bgmSnare(beatT+0.004); // snare わずかに遅らせてグルーヴ
      if(dp.h) bgmHihat(beatT+0.002);
    }
  }
  // 次のループをループ終了の0.5秒前にスケジュール
  const nextLoopStart=loopStartTime+LOOP_LEN;
  const scheduleIn=(nextLoopStart-bgmCtx.currentTime-0.5)*1000;
  bgmLoopTimer=setTimeout(()=>bgmScheduleLoop(nextLoopStart), Math.max(10,scheduleIn));
}

function bgmStart(){
  if(bgmRunning)return;
  bgmRunning=true;
  if(!bgmCtx){
    bgmCtx=new(window.AudioContext||window.webkitAudioContext)();
    bgmGain=bgmCtx.createGain();
    bgmGain.gain.value=0.42;
    bgmGain.connect(bgmCtx.destination);
  }
  if(bgmCtx.state==='suspended')bgmCtx.resume();
  const startT=bgmCtx.currentTime+0.15;
  bgmScheduleLoop(startT);
}

function bgmStop(){
  bgmRunning=false;
  if(bgmLoopTimer){clearTimeout(bgmLoopTimer);bgmLoopTimer=null;}
}

function bgmDuck(vol=0.1,ms=600){
  if(!bgmGain)return;
  bgmGain.gain.cancelScheduledValues(bgmCtx.currentTime);
  bgmGain.gain.linearRampToValueAtTime(vol,bgmCtx.currentTime+0.2);
  if(bgmDuckTimer)clearTimeout(bgmDuckTimer);
  bgmDuckTimer=setTimeout(()=>{
    if(bgmGain)bgmGain.gain.linearRampToValueAtTime(0.42,bgmCtx.currentTime+0.6);
  },ms);
}

}

// ================================================================
// RESULT COUNTUP SE
// ================================================================
function playCountTick(val){
  // tick sound per step, pitch rises with value
  try{
    const ctx=ac(),now=ctx.currentTime;
    const freq=440+Math.min(val*18,880);
    const o=ctx.createOscillator(),g=ctx.createGain();
    o.type='triangle';o.frequency.setValueAtTime(freq,now);
    o.connect(g);g.connect(sed());
    g.gain.setValueAtTime(.07,now);g.gain.exponentialRampToValueAtTime(.001,now+.045);
    o.start(now);o.stop(now+.06);
  }catch(e){}
}

function playCountFinish(isBonus){
  // ゴージャスなフィニッシュ
  try{
    const ctx=ac(),now=ctx.currentTime;
    if(isBonus){
      // ボーナス: ascending 5th with shimmer
      [[523.25,0,.22],[783.99,.07,.22],[1046.5,.14,.28],[1318.5,.21,.3],[1568,.28,.35]].forEach(([f,t,d])=>{
        const o=ctx.createOscillator(),g=ctx.createGain();
        o.type='triangle';o.frequency.value=f;
        o.connect(g);g.connect(sed());
        g.gain.setValueAtTime(0,now+t);g.gain.linearRampToValueAtTime(.22,now+t+.015);g.gain.exponentialRampToValueAtTime(.001,now+t+d);
        o.start(now+t);o.stop(now+t+d+.02);
      });
      [2093,2637].forEach((f,i)=>{
        const o=ctx.createOscillator(),g=ctx.createGain();
        o.type='sine';o.frequency.value=f;
        o.connect(g);g.connect(sed());
        const t=now+.32+i*.07;
        g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(.09,t+.01);g.gain.exponentialRampToValueAtTime(.001,t+.2);
        o.start(t);o.stop(t+.22);
      });
    } else {
      // 通常: bright arpeggio
      [[523.25,0,.18],[659.25,.055,.18],[783.99,.11,.2],[1046.5,.17,.26]].forEach(([f,t,d])=>{
        const o=ctx.createOscillator(),g=ctx.createGain();
        o.type='triangle';o.frequency.value=f;
        o.connect(g);g.connect(sed());
        g.gain.setValueAtTime(0,now+t);g.gain.linearRampToValueAtTime(.2,now+t+.014);g.gain.exponentialRampToValueAtTime(.001,now+t+d);
        o.start(now+t);o.stop(now+t+d+.02);
      });
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.type='sine';o.frequency.value=1318.5;
      o.connect(g);g.connect(sed());
      g.gain.setValueAtTime(0,now+.2);g.gain.linearRampToValueAtTime(.08,now+.21);g.gain.exponentialRampToValueAtTime(.001,now+.36);
      o.start(now+.2);o.stop(now+.38);
    }
  }catch(e){}
}

// Patch animCountUp to play tick SE
const _origAnimCountUp=animCountUp;
function animCountUp(el,from,to,duration,cb,isBonus=false){
  if(from===to){cb&&cb();return;}
  const start=performance.now();
  const diff=to-from;
  let lastTick=-1;
  function step(now){
    const t=Math.min(1,(now-start)/duration);
    const eased=1-(1-t)*(1-t);
    const val=Math.round(from+diff*eased);
    el.textContent=val;
    // SE: tick every 1pt
    if(val!==lastTick){lastTick=val;playCountTick(val);}
    if(t>=1){
      el.classList.remove('rsa-total-bump');
      void el.offsetWidth;
      el.classList.add('rsa-total-bump');
      playCountFinish(isBonus);
      cb&&cb();
    } else {
      requestAnimationFrame(step);
    }
  }
  requestAnimationFrame(step);
}

// Patch runScoreAnimation to pass isBonus flag
function runScoreAnimation(feedEl,totalEl,idx,running){
  if(idx>=solvedHistory.length)return;
  const h=solvedHistory[idx];
  const delay=idx===0?320:180;

  setTimeout(()=>{
    const row=document.createElement('div');
    row.className='rsa-row';
    const target=h.word[h.lang]||h.word.it;
    const flag=FLAG[h.lang]||'';
    let ptsHtml='',badgeHtml='';
    if(h.isPerfect){
      ptsHtml=`<span class="rsa-pts-perfect">✨パーフェクト！ ×2 → <b>+${h.pts}pt</b></span>`;
      badgeHtml=`<span class="rsa-badge perfect">PERFECT</span>`;
    } else {
      ptsHtml=`<span class="rsa-pts-base">+${h.pts}pt</span>`;
    }
    row.innerHTML=`<span class="rsa-word">${flag}${target}</span>${badgeHtml}${ptsHtml}`;
    feedEl.appendChild(row);
    feedEl.scrollTop=feedEl.scrollHeight;
    requestAnimationFrame(()=>requestAnimationFrame(()=>row.classList.add('in')));

    const newRunning1=running+h.pts;
    animCountUp(totalEl,running,newRunning1,380,()=>{
      if(h.bonusPts>0){
        setTimeout(()=>{
          const brow=document.createElement('div');
          brow.className='rsa-row';
          brow.style.background='rgba(240,160,48,.08)';
          brow.innerHTML=`
            <span style="flex:1;font-size:.74rem;color:var(--text-muted)">　↳ ボーナス</span>
            <span class="rsa-badge bonus">BONUS</span>
            <span class="rsa-pts-bonus">+${h.bonusPts}pt</span>
          `;
          feedEl.appendChild(brow);
          feedEl.scrollTop=feedEl.scrollHeight;
          requestAnimationFrame(()=>requestAnimationFrame(()=>brow.classList.add('in')));
          const newRunning2=newRunning1+h.bonusPts;
          animCountUp(totalEl,newRunning1,newRunning2,320,()=>{
            runScoreAnimation(feedEl,totalEl,idx+1,newRunning2);
          },true);
        },120);
      } else {
        runScoreAnimation(feedEl,totalEl,idx+1,newRunning1);
      }
    },false);
  },delay);
}

// ================================================================
// NPC AI (A1レベル)
// ================================================================
// A1 NPC: ゆっくり回答、たまに間違える、答えを「見る」ことが多い
const NPC_ID='__npc__';
const NPC_NAMES=['ロケット団員','ぺラップ','キャタピー','ポッポ','コラッタ'];
let npcTimer=null;

function npcShowOverlay(npcName, actionText, cardText){
  const ov=document.getElementById('npc-overlay');
  document.getElementById('npc-overlay-name').textContent='🤖 '+npcName;
  document.getElementById('npc-overlay-action').textContent=actionText;
  const prev=document.getElementById('npc-card-preview');
  if(cardText){
    prev.innerHTML=`<span>${cardText}</span>`;
  } else {
    prev.innerHTML='<div class="npc-typing-dots"><span></span><span></span><span></span></div>';
  }
  ov.classList.add('show');
}
function npcHideOverlay(){
  document.getElementById('npc-overlay').classList.remove('show');
}

function npcThink(){
  if(!MP.active||!MP.players[NPC_ID])return;
  if(MP.turnOrder[MP.currentTurnIdx]!==NPC_ID)return;

  const npc=MP.players[NPC_ID];
  const npcName=npc.name.replace('🤖 ','');
  const cat=currentCat;
  const lang=currentLang;
  const langName={it:'イタリア語',de:'ドイツ語',en:'英語'}[lang]||'イタリア語';
  const words=WORD_DATA[cat]?.words||[];
  const unsolved=words.map((_,i)=>i).filter(i=>!getSolved(cat).has(i));

  if(!unsolved.length){npcHideOverlay();nextTurn();return;}

  // カードをランダムに選ぶ
  const idx=unsolved[Math.floor(Math.random()*unsolved.length)];
  const w=words[idx];
  const correct=w[lang]||w.it;
  const icon=w.icon||'📖';
  const ja=w.ja||'';

  // Phase 1: 考え中オーバーレイ表示（0〜1.2s）
  npcShowOverlay(npcName, `${langName}で操作中…`, null);

  // Phase 2: カードにフォーカス（1.2s）
  const t1=700+Math.random()*600;
  npcTimer=setTimeout(()=>{
    if(!MP.active||MP.turnOrder[MP.currentTurnIdx]!==NPC_ID){npcHideOverlay();return;}
    npcShowOverlay(npcName, `${icon} ${ja}を考えています…`, '???');

    // Phase 3: 入力アニメーション（2.0〜2.8s）
    const t2=800+Math.random()*500;
    npcTimer=setTimeout(()=>{
      if(!MP.active||MP.turnOrder[MP.currentTurnIdx]!==NPC_ID){npcHideOverlay();return;}

      // A1: 55%peek(1pt) / 30%正解(5pt) / 15%不正解
      const roll=Math.random();
      let pts=0;
      let actionLabel='';
      let cardDisplay='';
      let didSolve=false;

      if(roll<0.55){
        // peek: 答えを見てから入力
        pts=1;
        actionLabel=`📖 答えを確認して入力…`;
        cardDisplay=correct;
        didSolve=true;
      } else if(roll<0.85){
        // 正解
        pts=5;
        actionLabel=`✏️ 入力中…`;
        // タイピング演出: 1文字ずつ
        cardDisplay=correct;
        didSolve=true;
      } else {
        // 不正解
        pts=0;
        actionLabel=`❌ わからない…`;
        cardDisplay='…？';
        didSolve=false;
      }

      // タイピング演出
      if(didSolve){
        let typed='';
        const chars=[...correct];
        npcShowOverlay(npcName, actionLabel, '');
        const typeInterval=setInterval(()=>{
          if(!MP.active){clearInterval(typeInterval);npcHideOverlay();return;}
          typed+=chars.shift()||'';
          document.getElementById('npc-card-preview').innerHTML=`<span>${typed}</span>`;
          if(!chars.length)clearInterval(typeInterval);
        }, Math.min(120, 800/correct.length));
      } else {
        npcShowOverlay(npcName, actionLabel, cardDisplay);
      }

      // Phase 4: 結果処理（+1.2s）
      npcTimer=setTimeout(()=>{
        npcHideOverlay();
        if(!MP.active||MP.turnOrder[MP.currentTurnIdx]!==NPC_ID)return;

        if(didSolve){
          getSolved(cat).add(idx);
          getSolvedLang(cat)[idx]=lang;
          if(!npc.langPts)npc.langPts={it:0,de:0,en:0};
          npc.pts=(npc.pts||0)+pts;
          npc.langPts[lang]=(npc.langPts[lang]||0)+pts;
          // カードをsolvedにして視覚的にパルス
          updateScore();renderGrid(cat);updateScorebar();
          const card=document.querySelector(`#word-grid .word-card[data-idx="${idx}"]`);
          if(card){
            card.style.transition='box-shadow .3s';
            card.style.boxShadow='0 0 18px #40c080';
            setTimeout(()=>card.style.boxShadow='',700);
          }
        }
        setTimeout(()=>nextTurn(), 400);
      }, 1100);

    }, t2);
  }, t1);
}
