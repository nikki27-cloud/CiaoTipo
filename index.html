<!DOCTYPE html>
<html lang="ja" data-lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>CiaoTipo</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Lato:wght@300;400;700&family=UnifrakturMaguntia&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f5f6fc;--bg2:#eaecf7;--card:#fff;--card-border:#cdd1ec;
  --text:#1a1c3a;--text-muted:#6870aa;--surface:rgba(0,0,0,.03);
  --shadow:rgba(80,90,180,.13);--modal-bg:linear-gradient(160deg,#fff,#eef0ff);
  --input-bg:rgba(0,0,0,.04);--input-border:rgba(0,0,0,.13);
  --hint-bar-bg:rgba(255,255,255,.85);
}
@media(prefers-color-scheme:dark){:root{
  --bg:#0e0e1c;--bg2:#151528;--card:#1c1c38;--card-border:#2c2c58;
  --text:#e6e8ff;--text-muted:#8890bb;--surface:rgba(255,255,255,.04);
  --shadow:rgba(0,0,0,.5);--modal-bg:linear-gradient(160deg,#1a1a3a,#111128);
  --input-bg:rgba(255,255,255,.06);--input-border:rgba(255,255,255,.12);
  --hint-bar-bg:rgba(0,0,0,.38);
}}
[data-theme=light]{
  --bg:#f5f6fc;--bg2:#eaecf7;--card:#fff;--card-border:#cdd1ec;
  --text:#1a1c3a;--text-muted:#6870aa;--surface:rgba(0,0,0,.03);
  --shadow:rgba(80,90,180,.13);--modal-bg:linear-gradient(160deg,#fff,#eef0ff);
  --input-bg:rgba(0,0,0,.04);--input-border:rgba(0,0,0,.13);
  --hint-bar-bg:rgba(255,255,255,.85);
}
[data-theme=dark]{
  --bg:#0e0e1c;--bg2:#151528;--card:#1c1c38;--card-border:#2c2c58;
  --text:#e6e8ff;--text-muted:#8890bb;--surface:rgba(255,255,255,.04);
  --shadow:rgba(0,0,0,.5);--modal-bg:linear-gradient(160deg,#1a1a3a,#111128);
  --input-bg:rgba(255,255,255,.06);--input-border:rgba(255,255,255,.12);
  --hint-bar-bg:rgba(0,0,0,.38);
}
[data-lang=it]{--accent:#c8920a;--accent2:#6b5fdd;--green:#2a9e60;--hint-color:#d06818;--glow:rgba(200,146,10,.28);}
[data-lang=de]{--accent:#a87c00;--accent2:#7a6e00;--green:#2a9e60;--hint-color:#b87200;--glow:rgba(168,124,0,.28);}
[data-lang=en]{--accent:#1558a0;--accent2:#a81028;--green:#2a9e60;--hint-color:#b05810;--glow:rgba(21,88,160,.24);}
@media(prefers-color-scheme:dark){
  [data-lang=it]{--accent:#dda828;--accent2:#8a7aff;--green:#3ed476;--hint-color:#f09040;--glow:rgba(221,168,40,.3);}
  [data-lang=de]{--accent:#c8a020;--accent2:#a89a10;--green:#3ed476;--hint-color:#d89828;--glow:rgba(200,160,32,.3);}
  [data-lang=en]{--accent:#4a92e8;--accent2:#d84060;--green:#3ed476;--hint-color:#e09030;--glow:rgba(74,146,232,.26);}
}
[data-theme=light][data-lang=it]{--accent:#c8920a;--accent2:#6b5fdd;--green:#2a9e60;--hint-color:#d06818;--glow:rgba(200,146,10,.28);}
[data-theme=light][data-lang=de]{--accent:#a87c00;--accent2:#7a6e00;--green:#2a9e60;--hint-color:#b87200;--glow:rgba(168,124,0,.28);}
[data-theme=light][data-lang=en]{--accent:#1558a0;--accent2:#a81028;--green:#2a9e60;--hint-color:#b05810;--glow:rgba(21,88,160,.24);}
[data-theme=dark][data-lang=it]{--accent:#dda828;--accent2:#8a7aff;--green:#3ed476;--hint-color:#f09040;--glow:rgba(221,168,40,.3);}
[data-theme=dark][data-lang=de]{--accent:#c8a020;--accent2:#a89a10;--green:#3ed476;--hint-color:#d89828;--glow:rgba(200,160,32,.3);}
[data-theme=dark][data-lang=en]{--accent:#4a92e8;--accent2:#d84060;--green:#3ed476;--hint-color:#e09030;--glow:rgba(74,146,232,.26);}

*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Lato',sans-serif;min-height:100vh;overflow-x:hidden;transition:background .3s,color .3s;}

/* HEADER */
header{display:flex;align-items:center;justify-content:space-between;padding:10px 18px;border-bottom:1px solid var(--card-border);background:var(--bg2);position:sticky;top:0;z-index:200;flex-wrap:wrap;gap:7px;transition:background .3s;position:relative;}
header::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;}
[data-lang=it] header::after{background:linear-gradient(90deg,#4a9a5a 33%,#e0e0e0 33% 66%,#c02828 66%);}
[data-lang=de] header::after{background:linear-gradient(90deg,#222 33%,#c8a020 33% 66%,#c8a020 66%);}
[data-lang=en] header::after{background:linear-gradient(90deg,#a81028 33%,#e0e0e0 33% 66%,#1558a0 66%);}
.logo{font-family:'Cinzel Decorative',serif;font-size:1rem;color:var(--accent);letter-spacing:2px;white-space:nowrap;}
[data-lang=de] .logo{font-family:'UnifrakturMaguntia',cursive;font-size:1.4rem;}
[data-lang=en] .logo{font-family:'IM Fell English',serif;font-size:1.15rem;font-style:italic;}
.header-right{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.score-badge{background:var(--card);border:1px solid var(--card-border);border-radius:20px;padding:4px 13px;font-size:.84rem;font-weight:700;color:var(--accent);white-space:nowrap;}
.score-badge span{color:var(--text-muted);font-weight:300;margin:0 2px;}
.styled-select{appearance:none;background:var(--card);border:1.5px solid var(--card-border);border-radius:8px;color:var(--text);padding:5px 26px 5px 9px;font-family:'Lato',sans-serif;font-size:.8rem;cursor:pointer;background-repeat:no-repeat;background-position:right 8px center;transition:border-color .2s;}
.styled-select:focus{outline:none;border-color:var(--accent);}
#lang-select{border-color:var(--accent);}
.toggle-wrap{display:flex;align-items:center;gap:5px;font-size:.74rem;color:var(--text-muted);white-space:nowrap;user-select:none;}
.toggle{position:relative;width:32px;height:18px;display:inline-block;}
.toggle input{opacity:0;width:0;height:0;}
.toggle-slider{position:absolute;inset:0;background:var(--card-border);border-radius:18px;transition:background .25s;cursor:pointer;}
.toggle-slider::before{content:'';position:absolute;width:12px;height:12px;left:3px;top:3px;background:#fff;border-radius:50%;transition:transform .25s;}
.toggle input:checked+.toggle-slider{background:var(--accent);}
.toggle input:checked+.toggle-slider::before{transform:translateX(14px);}
.hdr-btn{background:var(--card);border:1.5px solid var(--card-border);border-radius:8px;color:var(--text);padding:4px 11px;font-family:'Lato',sans-serif;font-size:.79rem;cursor:pointer;transition:background .2s,border-color .2s,color .2s;white-space:nowrap;}
.hdr-btn:hover{border-color:var(--accent);}
.hdr-btn.danger{border-color:#c04050;color:#c04050;}
.hdr-btn.danger:hover{background:#c04050;color:#fff;}
.hdr-btn.accent2{border-color:var(--accent2);color:var(--accent2);}
.hdr-btn.accent2:hover{background:var(--accent2);color:#fff;}

/* SCOREBAR (multi) */
#scorebar{display:none;background:var(--bg2);border-bottom:1px solid var(--card-border);padding:5px 18px;gap:10px;flex-wrap:wrap;align-items:center;font-size:.78rem;}
#scorebar.on{display:flex;}
.sb-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:3px;}
#turn-label{font-weight:700;color:var(--accent);padding:3px 9px;background:var(--surface);border-radius:7px;}

/* HINT BAR */
.hint-bar{background:var(--hint-bar-bg);border-bottom:1px solid var(--card-border);padding:5px 18px;font-size:.74rem;color:var(--text-muted);display:flex;align-items:center;gap:14px;flex-wrap:wrap;backdrop-filter:blur(6px);}
.hint-bar kbd{display:inline-block;background:var(--card);border:1px solid var(--card-border);border-radius:4px;padding:1px 6px;font-size:.72rem;font-family:monospace;color:var(--accent);margin:0 1px;}
.hint-bar .sep{color:var(--card-border);}

/* MILESTONE — comic outline style, no background */
@import url('https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap');
#milestone-msg{
  position:fixed;top:42%;left:50%;
  transform:translate(-50%,-50%) scale(.5) rotate(-4deg);
  background:none;border:none;border-radius:0;padding:0;
  font-family:'Fredoka One',cursive;
  font-size:3.2rem;font-weight:900;
  color:#fff;
  text-align:center;z-index:9999;
  opacity:0;pointer-events:none;
  text-shadow:
    -3px -3px 0 #3a2800,
     3px -3px 0 #3a2800,
    -3px  3px 0 #3a2800,
     3px  3px 0 #3a2800,
     0    4px 0 #3a2800,
     4px  0   0 #3a2800,
    -4px  0   0 #3a2800,
     0   -4px 0 #3a2800;
  letter-spacing:2px;
  transition:opacity .35s, transform .35s cubic-bezier(.175,.885,.32,1.4);
  filter:drop-shadow(0 4px 18px rgba(0,0,0,.35));
}
#milestone-msg.show{opacity:1;transform:translate(-50%,-50%) scale(1) rotate(-2deg);}
#milestone-msg .ms-rainbow{
  background:linear-gradient(90deg,#ffb3d1,#b3d1ff,#b3ffce,#fff3b3,#ffb3d1);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  background-size:200%;
  animation:ms-shift 1.2s linear infinite;
}
@keyframes ms-shift{to{background-position:200%;}}
/* bonus popup */
#bonus-msg{
  position:fixed;top:32%;left:50%;
  transform:translate(-50%,-50%) scale(.5);
  background:none;border:none;
  font-family:'Fredoka One',cursive;
  font-size:2.4rem;font-weight:900;
  color:#ffe060;
  text-shadow:
    -3px -3px 0 #7a4800,3px -3px 0 #7a4800,
    -3px  3px 0 #7a4800,3px  3px 0 #7a4800,
     0    4px 0 #7a4800,0   -4px 0 #7a4800;
  z-index:9998;opacity:0;pointer-events:none;
  transition:opacity .3s,transform .35s cubic-bezier(.175,.885,.32,1.4);
  text-align:center;
}
#bonus-msg.show{opacity:1;transform:translate(-50%,-50%) scale(1);}

/* MAIN / GRID */
main{padding:16px 18px;max-width:1500px;margin:0 auto;}
#category-title{font-family:'Cinzel Decorative',serif;font-size:.8rem;color:var(--text-muted);margin-bottom:13px;letter-spacing:3px;text-transform:uppercase;}
[data-lang=de] #category-title{font-family:'UnifrakturMaguntia',cursive;font-size:1rem;}
[data-lang=en] #category-title{font-family:'IM Fell English',serif;}
.word-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(106px,1fr));gap:8px;}

/* CARD */
.word-card{background:var(--card);border:1.5px solid var(--card-border);border-radius:12px;padding:8px 6px 6px;display:flex;flex-direction:column;align-items:center;gap:3px;position:relative;transition:border-color .25s,box-shadow .25s,transform .18s;overflow:visible;}
.word-card:hover{transform:translateY(-2px);}
.word-card.solved{border-color:var(--green);box-shadow:0 0 9px rgba(42,158,96,.18),inset 0 0 14px rgba(42,158,96,.03);}
.word-card.mp-highlight{border-color:var(--player-color,#aaa) !important;box-shadow:0 0 10px var(--player-color,#aaa) !important;}
.card-icon{font-size:2rem;line-height:1;user-select:none;}
.card-ja{font-size:.63rem;color:var(--text-muted);text-align:center;line-height:1.3;padding:0 2px;word-break:keep-all;}

/* solved word — same position as input, wraps after 12 chars */
.card-answer{
  font-size:.64rem;color:var(--green);font-weight:700;
  text-align:center;word-break:break-all;overflow-wrap:anywhere;
  width:100%;line-height:1.3;min-height:22px;
  display:flex;align-items:center;justify-content:center;
  padding:2px 4px;
  opacity:0;transform:translateY(3px);
  transition:opacity .4s,transform .4s;
}
.word-card.solved .card-answer{opacity:1;transform:translateY(0);}
.card-input{width:100%;background:var(--input-bg);border:1px solid var(--input-border);border-radius:6px;color:var(--text);font-family:'Lato',sans-serif;font-size:.71rem;padding:3px 4px;text-align:center;outline:none;min-height:22px;transition:border-color .2s,box-shadow .2s;}
.card-input:focus{border-color:var(--accent2);box-shadow:0 0 0 2px rgba(107,95,221,.12);}
.card-input.wrong{border-color:#c04050!important;animation:shake .28s;}
.card-input:disabled{opacity:0;pointer-events:none;height:0;padding:0;min-height:0;border:none;}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}

/* PEEK BTN */
.peek-btn{position:absolute;top:4px;right:4px;background:none;border:none;cursor:pointer;font-size:0;padding:2px;opacity:.38;color:var(--text-muted);transition:opacity .2s;z-index:5;display:flex;align-items:center;}
.peek-btn:hover{opacity:.9;}
.peek-btn svg{display:block;}
.peek-btn.peeking svg{animation:hgspin 1s linear infinite;}
@keyframes hgspin{to{transform:rotate(180deg)}}
.peek-reveal{position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:rgba(192,64,64,.92);color:#fff;border-radius:7px;padding:4px 10px;font-size:.73rem;font-weight:700;white-space:nowrap;pointer-events:none;z-index:400;box-shadow:0 3px 12px rgba(0,0,0,.32);animation:fadein .14s ease-out;}
@keyframes fadein{from{opacity:0;transform:translateX(-50%) translateY(4px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.peek-timer{position:absolute;bottom:0;left:0;height:2px;background:linear-gradient(90deg,#d85050,#e8a040);border-radius:0 0 12px 12px;z-index:6;}

/* TRIVIA BTN — solved cards only */
.trivia-btn{position:absolute;top:4px;left:4px;background:none;border:none;cursor:pointer;font-size:.72rem;padding:1px 3px;opacity:.35;color:var(--accent);transition:opacity .2s;z-index:5;font-weight:700;line-height:1;}
.trivia-btn:hover,.trivia-btn.active{opacity:1;}
.trivia-popup{position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:var(--bg2);border:1px solid var(--card-border);border-radius:9px;padding:8px 11px;font-size:.71rem;min-width:155px;max-width:215px;pointer-events:none;z-index:400;box-shadow:0 4px 16px var(--shadow);line-height:1.55;color:var(--text);animation:fadein .14s ease-out;white-space:normal;}
.trivia-popup b{color:var(--accent);font-size:.68rem;display:block;margin-bottom:2px;letter-spacing:.4px;}

/* BONUS CARD */
.word-card.bonus-card{animation:bonus-pulse 1s ease-in-out infinite;}
@keyframes bonus-pulse{
  0%,100%{box-shadow:0 0 7px 1px rgba(255,200,30,.35),0 0 0 0 rgba(255,200,30,0);}
  50%{box-shadow:0 0 18px 5px rgba(255,200,30,.7),0 0 0 3px rgba(255,200,30,.15);}
}
.bonus-badge{position:absolute;top:-8px;left:50%;transform:translateX(-50%);background:#ffe060;color:#6a3c00;font-size:.57rem;font-weight:900;padding:1px 7px;border-radius:9px;white-space:nowrap;z-index:8;pointer-events:none;font-family:'Lato',sans-serif;letter-spacing:.3px;box-shadow:0 1px 4px rgba(0,0,0,.25);}

/* MP EVENT BAR */
#mp-event-bar{display:none;background:linear-gradient(90deg,rgba(255,200,30,.18),rgba(255,160,40,.18));border-bottom:1px solid rgba(255,200,30,.35);padding:5px 18px;font-size:.78rem;color:var(--accent);font-weight:700;text-align:center;letter-spacing:.4px;}
#mp-event-bar.on{display:block;}

/* SOFT SPARKLE (solved card ambient) */
.sparkle-container{position:absolute;inset:0;pointer-events:none;overflow:visible;z-index:10;}
.soft-spark{position:absolute;border-radius:50%;pointer-events:none;opacity:0;animation:soft-sp 3s ease-in-out infinite;}
@keyframes soft-sp{0%{opacity:0;transform:scale(0) translateY(0)}45%{opacity:.5;transform:scale(1.1) translateY(-5px)}100%{opacity:0;transform:scale(0) translateY(-11px)}}

/* PIKMIN BURST (correct answer) */
.pkm-p{position:absolute;pointer-events:none;font-size:.85rem;animation:pkm-fly 1s ease-out forwards;z-index:20;}
@keyframes pkm-fly{0%{transform:translate(0,0) scale(1);opacity:1}65%{opacity:1}100%{transform:translate(var(--px),var(--py)) scale(.1);opacity:0}}
.pkm-star{position:absolute;pointer-events:none;width:var(--sz);height:var(--sz);background:var(--col);clip-path:polygon(50% 0%,61% 35%,98% 35%,68% 57%,79% 91%,50% 70%,21% 91%,32% 57%,2% 35%,39% 35%);animation:pkm-starpop .8s ease-out forwards;z-index:20;}
@keyframes pkm-starpop{0%{transform:translate(0,0) scale(0) rotate(0deg);opacity:1}42%{transform:translate(var(--px),var(--py)) scale(1.2) rotate(var(--r));opacity:1}100%{transform:translate(var(--px2),var(--py2)) scale(0) rotate(var(--r2));opacity:0}}
.pkm-ring{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%) scale(0);border:2px solid var(--accent);border-radius:50%;width:10px;height:10px;pointer-events:none;animation:pkm-ring .55s ease-out forwards;z-index:15;opacity:.65;}
@keyframes pkm-ring{to{transform:translate(-50%,-50%) scale(7);opacity:0}}

/* END BUTTON */
.end-section{margin:28px auto;max-width:1500px;padding:0 18px 32px;text-align:center;}
.btn-end{background:linear-gradient(135deg,var(--accent),color-mix(in srgb,var(--accent) 58%,#000));color:#fff;border:none;border-radius:13px;padding:15px 52px;font-family:'Lato',sans-serif;font-weight:700;font-size:.98rem;cursor:pointer;transition:transform .2s,box-shadow .2s;box-shadow:0 3px 14px var(--glow);}
.btn-end:hover{transform:translateY(-3px);box-shadow:0 6px 22px var(--glow);}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.62);z-index:500;align-items:center;justify-content:center;backdrop-filter:blur(4px);}
.modal-overlay.open{display:flex;}
.modal-box{background:var(--modal-bg);border:1.5px solid var(--card-border);border-radius:17px;padding:28px 36px;max-width:530px;width:92%;text-align:center;box-shadow:0 16px 60px var(--shadow);}
.modal-box h2{font-family:'Cinzel Decorative',serif;font-size:1rem;color:var(--accent);margin-bottom:11px;}
[data-lang=de] .modal-box h2{font-family:'UnifrakturMaguntia',cursive;font-size:1.35rem;}
[data-lang=en] .modal-box h2{font-family:'IM Fell English',serif;font-style:italic;}
.modal-box p{color:var(--text-muted);font-size:.87rem;line-height:1.7;margin-bottom:17px;}
.modal-btns{display:flex;gap:9px;justify-content:center;flex-wrap:wrap;}
.btn-primary{background:linear-gradient(135deg,var(--accent),color-mix(in srgb,var(--accent) 62%,#000));color:#fff;border:none;border-radius:9px;padding:9px 21px;font-family:'Lato',sans-serif;font-weight:700;font-size:.87rem;cursor:pointer;transition:transform .15s,box-shadow .15s;}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 4px 14px var(--glow);}
.btn-secondary{background:transparent;border:1.5px solid var(--text-muted);color:var(--text-muted);border-radius:9px;padding:9px 21px;font-family:'Lato',sans-serif;font-size:.87rem;cursor:pointer;transition:border-color .2s,color .2s;}
.btn-secondary:hover{border-color:var(--text);color:var(--text);}
.result-list{text-align:left;margin:9px 0 15px;max-height:290px;overflow-y:auto;padding-right:3px;}
.result-list::-webkit-scrollbar{width:4px;}
.result-list::-webkit-scrollbar-thumb{background:var(--card-border);border-radius:4px;}
.ri{display:flex;align-items:center;gap:7px;padding:4px 7px;border-radius:6px;margin-bottom:3px;font-size:.8rem;background:var(--surface);}
.ri-ico{font-size:1.1rem;}.ri-w{color:var(--accent);font-weight:700;}.ri-m{color:var(--text-muted);margin-left:auto;font-size:.74rem;}.ri-lang{font-size:.85rem;}.ri-pk{font-size:.66rem;color:#c05050;}
.result-score{font-size:.96rem;margin-bottom:6px;}
.result-score strong{color:var(--green);font-size:1.18rem;}

/* MULTI PANEL */
#multi-panel{display:none;position:fixed;inset:0;background:var(--bg);z-index:600;overflow-y:auto;padding:22px 18px;}
#multi-panel.open{display:block;}
.mp-header{display:flex;align-items:center;gap:12px;margin-bottom:18px;}
.mp-header h2{font-family:'Cinzel Decorative',serif;font-size:1.05rem;color:var(--accent);}
.mp-section{background:var(--card);border:1.5px solid var(--card-border);border-radius:13px;padding:18px 22px;margin-bottom:14px;max-width:460px;margin-left:auto;margin-right:auto;}
.mp-section h3{font-size:.86rem;font-weight:700;color:var(--text-muted);margin-bottom:11px;letter-spacing:.8px;text-transform:uppercase;}
.mp-input{width:100%;background:var(--input-bg);border:1.5px solid var(--card-border);border-radius:7px;color:var(--text);font-family:'Lato',sans-serif;font-size:.87rem;padding:7px 11px;outline:none;margin-bottom:7px;transition:border-color .2s;}
.mp-input:focus{border-color:var(--accent);}
.mp-code{font-family:monospace;font-size:1.6rem;font-weight:700;color:var(--accent);letter-spacing:8px;text-align:center;padding:12px;background:var(--surface);border-radius:8px;margin:8px 0;}
.mp-player-list{display:flex;flex-direction:column;gap:5px;margin-top:9px;}
.mp-player{display:flex;align-items:center;gap:8px;padding:6px 9px;background:var(--surface);border-radius:6px;font-size:.82rem;}
.mp-pdot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.mp-pts{margin-left:auto;font-weight:700;color:var(--accent);font-size:.78rem;}
.mp-result-row{display:flex;align-items:center;gap:8px;padding:7px 10px;background:var(--surface);border-radius:7px;margin-bottom:5px;font-size:.82rem;}
.mp-rank{font-weight:700;font-size:.9rem;width:20px;}

/* CURSOR LABELS */
.cursor-label{position:fixed;pointer-events:none;z-index:7000;display:flex;flex-direction:column;align-items:center;transition:left .06s linear,top .06s linear;}
.cursor-dot{width:11px;height:11px;border-radius:50%;border:2px solid rgba(255,255,255,.7);}
.cursor-name{font-size:.67rem;font-weight:700;border-radius:4px;padding:1px 5px;margin-top:1px;white-space:nowrap;color:#fff;}

/* TURN BANNER */
#turn-banner{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(.7);background:var(--modal-bg);border:2px solid var(--accent);border-radius:14px;padding:14px 30px;font-size:1.05rem;font-weight:700;color:var(--accent);text-align:center;z-index:8000;opacity:0;pointer-events:none;transition:all .4s cubic-bezier(.175,.885,.32,1.275);}
#turn-banner.show{opacity:1;transform:translate(-50%,-50%) scale(1);}
</style>
</head>
<body>

<header>
  <div class="logo" id="logo-text">🇮🇹 Italiano Master</div>
  <div class="header-right">
    <div class="score-badge" id="score-display">0 <span>/</span> 0</div>
    <select class="styled-select" id="lang-select">
      <option value="it">🇮🇹 イタリア語</option>
      <option value="de">🇩🇪 ドイツ語</option>
      <option value="en">🇬🇧 英語</option>
    </select>
    <select class="styled-select" id="cat-select">
      <option value="verbs">🔤 動詞</option>
      <option value="animals">🐾 動物</option>
      <option value="fantasy">⚔️ ファンタジー</option>
      <option value="pokemon">🎮 ポケモン</option>
    </select>
    <div class="toggle-wrap">
      <label><span>à→a</span>
        <span class="toggle"><input type="checkbox" id="accent-toggle"><span class="toggle-slider"></span></span>
      </label>
    </div>
    <button class="hdr-btn" id="btn-theme">🌙</button>
    <button class="hdr-btn accent2" id="btn-multi">👥 マルチ</button>
    <button class="hdr-btn danger" id="btn-quit">諦める</button>
  </div>
</header>

<div id="scorebar">
  <span id="turn-label"></span>
  <div id="sb-players"></div>
</div>
<div id="mp-event-bar"></div>

<div class="hint-bar">
  <span>💡 操作方法：</span>
  <span>入力して自動判定 / Enter</span>
  <span class="sep">｜</span>
  <span><kbd>Shift</kbd>＋ホバーでヒント（-3pt）</span>
  <span class="sep">｜</span>
  <span>⏳ 5秒答え表示（-4pt）</span>
  <span class="sep">｜</span>
  <span>💡 豆知識を表示</span>
</div>

<div id="milestone-msg"><span class="ms-rainbow"></span></div>
<div id="bonus-msg"></div>
<div id="turn-banner"></div>

<main>
  <div id="category-title"></div>
  <div class="word-grid" id="word-grid"></div>
</main>
<div class="end-section">
  <button class="btn-end" id="btn-end">🏁 終了してリザルトへ</button>
</div>

<!-- quit -->
<div class="modal-overlay" id="modal-quit">
  <div class="modal-box">
    <h2 id="quit-title">😢 本当に諦めますか？</h2>
    <p id="quit-body">まだ挑戦できます！<br>あと少しで全問正解かも。</p>
    <div class="modal-btns">
      <button class="btn-primary" id="btn-continue">続ける</button>
      <button class="btn-secondary" id="btn-give-up">諦める</button>
    </div>
  </div>
</div>

<!-- result -->
<div class="modal-overlay" id="modal-result">
  <div class="modal-box">
    <p id="result-text" class="result-score"></p>
    <div class="result-list" id="result-list"></div>
    <div class="modal-btns">
      <button class="btn-primary" id="btn-close-result">とじる</button>
    </div>
  </div>
</div>

<!-- multi panel -->
<div id="multi-panel">
  <div class="mp-header">
    <button class="btn-secondary" id="btn-mp-close" style="padding:5px 13px;font-size:.8rem;">← 戻る</button>
    <h2>👥 マルチプレイ</h2>
  </div>
  <div class="mp-section" id="mps-setup">
    <h3>プレイヤー設定</h3>
    <input class="mp-input" id="mp-name" placeholder="名前（空白でランダム）" maxlength="14">
    <div style="display:flex;gap:8px;">
      <button class="btn-primary" id="btn-host" style="flex:1">🏠 ルームを作る</button>
      <button class="btn-secondary" id="btn-join-show" style="flex:1">🚪 参加する</button>
    </div>
  </div>
  <div class="mp-section" id="mps-join" style="display:none">
    <h3>あいことばで参加</h3>
    <input class="mp-input" id="mp-code-in" placeholder="あいことば" maxlength="6" style="text-transform:uppercase;letter-spacing:5px;font-size:1.1rem;text-align:center">
    <button class="btn-primary" id="btn-join" style="width:100%">参加する</button>
  </div>
  <div class="mp-section" id="mps-room" style="display:none">
    <h3>ルーム</h3>
    <div class="mp-code" id="mp-room-code"></div>
    <p style="font-size:.76rem;color:var(--text-muted);text-align:center;margin-bottom:8px">このあいことばを友達に共有してください</p>
    <div class="mp-player-list" id="mp-plist"></div>
    <div style="margin-top:11px;display:flex;gap:7px;">
      <button class="btn-primary" id="btn-mp-start" style="flex:1;display:none">▶ ゲーム開始</button>
      <button class="btn-secondary" id="btn-mp-leave" style="flex:1">退出</button>
    </div>
  </div>
  <div class="mp-section" id="mps-result" style="display:none">
    <h3>マルチ結果</h3>
    <div id="mp-result-list"></div>
  </div>
</div>

function stripAccents(s){return s.normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/ß/g,"ss");}
function norm(s){
  s=s.trim().toLowerCase().replace(/['']/g,"'");
  if(accentFree)s=stripAccents(s);
  return s;
}
const ARTS={it:["il","lo","la","i","gli","le","l'","l","un","uno","una","un'"],de:["der","die","das","ein","eine","einen","einem","einer","des","dem","den"],en:["the","a","an"]};
function checkAnswer(inp,correct){
  const v=norm(inp), c=norm(correct);
  if(v===c)return true;
  for(const a of(ARTS[currentLang]||[])){if(v===a+" "+c||v===a+c)return true;}
  return false;
}

  try{

  }catch(e){}
}

// 5-question milestone fanfare
function playMilestone(){
  try{
    const ctx=ac(),now=ctx.currentTime;
    const melody=[523.25,659.25,783.99,1046.5,1318.5,1046.5,1318.5,1568];
    const times=[0,.045,.09,.135,.18,.24,.28,.32];
    const durs=[.18,.18,.18,.2,.18,.14,.14,.35];
    melody.forEach((f,i)=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);
      o.type=i<4?'triangle':'sine';o.frequency.value=f;
      const t=now+times[i];
      g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(.26,t+.015);g.gain.exponentialRampToValueAtTime(.001,t+durs[i]);
      o.start(t);o.stop(t+durs[i]+.02);
    });
    [130.81,196].forEach((f,i)=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);
      o.type='sine';o.frequency.value=f;
      const t=now+i*.05;
      g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(.2,t+.02);g.gain.exponentialRampToValueAtTime(.001,t+.28);
      o.start(t);o.stop(t+.32);
    });
    const buf=ctx.createBuffer(1,ctx.sampleRate*.06,ctx.sampleRate);
    const d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*(1-i/d.length)*.5;
    const src=ctx.createBufferSource(),gn=ctx.createGain();
    src.buffer=buf;src.connect(gn);gn.connect(ctx.destination);
    gn.gain.setValueAtTime(.12,now);gn.gain.exponentialRampToValueAtTime(.001,now+.06);
    src.start(now);src.stop(now+.08);
  }catch(e){}
}

function playTyping(){
  try{
    const ctx=ac();
    const buf=ctx.createBuffer(1,Math.floor(ctx.sampleRate*.038),ctx.sampleRate);
    const d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*(1-i/d.length)*.55;
    const src=ctx.createBufferSource(),flt=ctx.createBiquadFilter(),g=ctx.createGain();
    flt.type='bandpass';flt.frequency.value=2400+Math.random()*700;flt.Q.value=1.4;
    src.buffer=buf;src.connect(flt);flt.connect(g);g.connect(ctx.destination);
    g.gain.setValueAtTime(.16,ctx.currentTime);g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.038);
    const o=ctx.createOscillator(),g2=ctx.createGain();
    o.type='sine';o.frequency.value=880+Math.random()*180;
    o.connect(g2);g2.connect(ctx.destination);
    g2.gain.setValueAtTime(.04,ctx.currentTime);g2.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.022);
    src.start();src.stop(ctx.currentTime+.05);
    o.start();o.stop(ctx.currentTime+.025);
  }catch(e){}
}

function makeHint(w){if(w.length<=2)return w;return w.slice(0,2)+"◯".repeat(w.length-2);}

function getTrivia(word){
  // Check exact match, then partial
  const key=norm(word);
  for(const k in TRIVIA){if(norm(k)===key)return TRIVIA[k];}
  return null;
}

const PEEK_DUR=5000;
let peekTimers={};
function handlePeek(btn,word,idx,cat,card){
  const key=`${cat}_${idx}`;
  if(peekTimers[key])return;
  getPeeked(cat).add(idx);
  btn.classList.add('peeking');
  const target=word[currentLang]||word.it;
  const rv=document.createElement('div');rv.className='peek-reveal';rv.textContent=target;card.appendChild(rv);
  const tb=document.createElement('div');tb.className='peek-timer';tb.style.width='100%';card.appendChild(tb);
  requestAnimationFrame(()=>{tb.style.transition=`width ${PEEK_DUR}ms linear`;tb.style.width='0%';});
  const inp=card.querySelector('.card-input');
  if(inp){inp.style.borderColor='#c86060';inp.focus();}
  // Award 1pt (peeked)
  awardPts(1,'peek');
  peekTimers[key]=setTimeout(()=>{
    rv.remove();tb.remove();btn.classList.remove('peeking');
    delete peekTimers[key];
    if(inp)inp.style.borderColor='';
  },PEEK_DUR);
}

let triviaOpenCard=null;
function handleTrivia(btn,word,card){
  const trivs=getTrivia(word[currentLang]||word.it)||getTrivia(word.it)||getTrivia(word.de)||getTrivia(word.en);
  if(!trivs)return;
  if(triviaOpenCard===card){
    closeTrivia(card);triviaOpenCard=null;return;
  }
  if(triviaOpenCard)closeTrivia(triviaOpenCard);
  triviaOpenCard=card;
  btn.classList.add('active');
  const pop=document.createElement('div');pop.className='trivia-popup';
  const tv=trivs[Math.floor(Math.random()*trivs.length)];
  pop.innerHTML=`<b>💡 豆知識</b>${tv}`;
  card.appendChild(pop);
}
function closeTrivia(card){
  card.querySelector('.trivia-popup')?.remove();
  card.querySelector('.trivia-btn')?.classList.remove('active');
}

// ================================================================
function renderGrid(cat){
  const data=WORD_DATA[cat];
  document.getElementById('category-title').textContent=data.title[currentLang]||data.title.it;
  const grid=document.getElementById('word-grid');grid.innerHTML="";
  const solSet=getSolved(cat);
  data.words.forEach((w,idx)=>{
    const isSolved=solSet.has(idx);
    const target=w[currentLang]||w.it;
    const hasTv=!!(getTrivia(target)||getTrivia(w.it)||getTrivia(w.de)||getTrivia(w.en));
    const card=document.createElement('div');
    card.className='word-card'+(isSolved?' solved':'');
    card.dataset.idx=idx;
    const HOURGLASS=`<svg viewBox="0 0 24 24" width="12" height="12" fill="currentColor"><path d="M6 2h12v4l-4 4 4 4v4H6v-4l4-4-4-4V2zm2 1v2.586l4 4 4-4V3H8zm8 14v-2.586l-4-4-4 4V17h8z"/></svg>`;
    card.innerHTML=`
      <div class="sparkle-container"></div>
      ${isSolved&&hasTv?`<button class="trivia-btn" title="豆知識">💡</button>`:''}
      ${!isSolved?`<button class="peek-btn" title="5秒だけ答えを見る">${HOURGLASS}</button>`:''}
      <div class="card-icon">${w.icon}</div>
      <div class="card-ja">${w.ja}</div>
      <div class="card-answer">${isSolved?target:''}</div>
      ${isSolved?'':`<input class="card-input" type="text" placeholder="…" autocomplete="off" spellcheck="false">`}
    `;
    if(isSolved)addSoftSparkles(card);
    // trivia — SOLVED cards only
    if(isSolved&&hasTv){
      const tb=card.querySelector('.trivia-btn');
      tb.addEventListener('click',e=>{e.stopPropagation();playClick();handleTrivia(tb,w,card);});
      tb.addEventListener('touchstart',e=>{e.stopPropagation();handleTrivia(tb,w,card);},{passive:true});
    }
    // hover hint (shift) + close trivia on click elsewhere
    card.addEventListener('mousemove',e=>{
      if(e.shiftKey&&!isSolved){
        if(!card.querySelector('.shift-hint')){
          getHinted(cat).add(idx);
          awardPts(-3,'hint');
          const h=document.createElement('div');h.className='peek-reveal shift-hint';
          h.style.background='rgba(168,100,0,.88)';
          h.textContent=makeHint(target);card.appendChild(h);
        }
      } else {
        card.querySelector('.shift-hint')?.remove();
      }
    });
    card.addEventListener('mouseleave',()=>card.querySelector('.shift-hint')?.remove());
    document.addEventListener('click',e=>{if(triviaOpenCard===card&&!card.contains(e.target)){closeTrivia(card);triviaOpenCard=null;}},{once:false});
    // peek
    if(!isSolved){
      const peekBtn=card.querySelector('.peek-btn');
      peekBtn?.addEventListener('click',e=>{e.stopPropagation();playClick();handlePeek(peekBtn,w,idx,cat,card);});
      // input
      const inp=card.querySelector('.card-input');
      inp.addEventListener('keydown',e=>{
        if(e.key==='Enter')tryAnswer(inp,w,idx,card,cat);
        else if(e.key.length===1)playTyping();
      });
      inp.addEventListener('input',()=>{
        if(checkAnswer(inp.value,target))tryAnswer(inp,w,idx,card,cat);
      });
      // mp: track focused card on touch
      inp.addEventListener('focus',()=>mpBroadcast({type:'card-focus',idx,cat}));
      inp.addEventListener('blur',()=>mpBroadcast({type:'card-blur',idx,cat}));
      // turn check
      inp.addEventListener('keydown',e=>{if(MP.active&&!isMyTurn()){e.preventDefault();}});
      // apply bonus card glow if this idx matches current bonus event
      if(MP.active&&MP.currentEvent&&(MP.currentEvent.type==='card'||MP.currentEvent.type==='both')){
        if(MP.currentEvent.bonusIdx===idx&&MP.currentEvent.bonusCat===cat){
          card.classList.add('bonus-card');
          const badge=document.createElement('div');badge.className='bonus-badge';
          badge.textContent=`✨ ボーナス +${MP.currentEvent.cardPts}pt`;
          card.appendChild(badge);
        }
      }
    }
    grid.appendChild(card);
  });
}

function tryAnswer(inp,word,idx,card,cat){
  const target=word[currentLang]||word.it;
  if(!checkAnswer(inp.value,target)){
    inp.classList.add('wrong');setTimeout(()=>inp.classList.remove('wrong'),320);
    playWrong();
    return;
  }
  const key=`${cat}_${idx}`;
  if(peekTimers[key]){clearTimeout(peekTimers[key]);delete peekTimers[key];card.querySelector('.peek-reveal')?.remove();card.querySelector('.peek-timer')?.remove();}
  getSolved(cat).add(idx);
  getSolvedLang(cat)[idx]=currentLang;
  card.classList.add('solved');
  card.querySelector('.card-answer').textContent=target;
  inp.disabled=true;
  card.querySelector('.peek-btn')?.remove();
  card.querySelector('.trivia-btn')?.remove();

  const wasPeeked=getPeeked(cat).has(idx);
  const wasHinted=getHinted(cat).has(idx);
  let pts=wasPeeked?1:wasHinted?2:5;

  // Check bonus events (multiplay)
  let bonusPts=0;
  if(MP.active&&MP.currentEvent){
    const ev=MP.currentEvent;
    // Event 1: bonus lang
    if(ev.type==='lang'&&currentLang===ev.lang){bonusPts+=ev.pts;}
    // Event 2: bonus card
    if((ev.type==='card'||ev.type==='both')&&card.classList.contains('bonus-card')){bonusPts+=ev.cardPts||2;}
    if((ev.type==='lang'||ev.type==='both')&&currentLang===ev.lang){bonusPts+=ev.langPts||0;}
  }

  // Track per-lang pts
  if(MP.active){
    const me=MP.players[MP.myId];
    if(me){
      if(!me.langPts)me.langPts={it:0,de:0,en:0};
      me.langPts[currentLang]=(me.langPts[currentLang]||0)+pts+bonusPts;
    }
  }

  spawnPikmin(card);addSoftSparkles(card);
  playCorrect(pts+bonusPts);
  vibrate(bonusPts>0?[30,20,60]:40);

  if(bonusPts>0){
    awardPts(pts,'correct');
    awardPts(bonusPts,'bonus');
    showBonus(bonusPts,card);
    // Clear bonus card glow from card
    card.classList.remove('bonus-card');
    card.querySelector('.bonus-badge')?.remove();
  } else {
    awardPts(pts,'correct');
  }

  updateScore();
  const s=countSolved();
  if(s>0&&s%5===0&&Math.floor(s/5)>milestoneCount){milestoneCount=Math.floor(s/5);setTimeout(showMilestone,350);}
  mpBroadcast({type:'solved',cat,idx,lang:currentLang,pts,bonusPts});
  if(MP.active)nextTurn();
}

// MULTIPLAYER (BroadcastChannel + PeerJS)
// ================================================================
function genCode(){return Math.random().toString(36).substr(2,4).toUpperCase();}
function genId(){return Math.random().toString(36).substr(2,8);}
function getMyName(){
  const n=document.getElementById('mp-name').value.trim();
  return n||GYM_NAMES[Math.floor(Math.random()*GYM_NAMES.length)];
}
function getMyColor(){
  const idx=Object.keys(MP.players).length%PLAYER_COLORS.length;
  return PLAYER_COLORS[idx];
}

// Points tracking
function awardPts(delta,reason){
  if(!MP.active)return;
  MP.myPts+=delta;
  const me=MP.players[MP.myId];
  if(me){
    me.pts=MP.myPts;
    // langPts updated in tryAnswer directly
  }
  updateScorebar();
  mpBroadcast({type:'pts-update',id:MP.myId,pts:MP.myPts,langPts:me?.langPts});
}

function updateScorebar(){
  if(!MP.active){document.getElementById('scorebar').classList.remove('on');return;}
  document.getElementById('scorebar').classList.add('on');
  const ti=document.getElementById('turn-label');
  const tp=MP.players[MP.turnOrder[MP.currentTurnIdx]];
  ti.textContent=tp?`${tp.name}のターン`:'';
  ti.style.color=tp?.color||'var(--accent)';
  const sb=document.getElementById('sb-players');sb.innerHTML='';
  MP.turnOrder.forEach(id=>{
    const p=MP.players[id];if(!p)return;
    const sp=document.createElement('span');
    sp.innerHTML=`<span class="sb-dot" style="background:${p.color}"></span>${p.name}: ${p.pts||0}pt`;
    sb.appendChild(sp);
  });
}

function isMyTurn(){
  if(!MP.active)return true;
  return MP.turnOrder[MP.currentTurnIdx]===MP.myId;
}

function nextTurn(){
  MP.currentTurnIdx=(MP.currentTurnIdx+1)%MP.turnOrder.length;
  mpBroadcast({type:'turn-change',idx:MP.currentTurnIdx});
  showTurnBanner();updateScorebar();
  // Generate new bonus event each turn
  setTimeout(generateBonusEvent,600);
}

function showTurnBanner(){
  const tp=MP.players[MP.turnOrder[MP.currentTurnIdx]];if(!tp)return;
  const b=document.getElementById('turn-banner');
  b.textContent=MP.turnOrder[MP.currentTurnIdx]===MP.myId?'あなたのターン！':`${tp.name}のターン`;
  b.style.color=tp.color;b.style.borderColor=tp.color;
  b.classList.add('show');setTimeout(()=>b.classList.remove('show'),2200);
}

// Cursor tracking
const cursors={};
let mouseMoveThrottle=0;
document.addEventListener('mousemove',e=>{
  if(!MP.active)return;
  const now=Date.now();if(now-mouseMoveThrottle<40)return;
  mouseMoveThrottle=now;
  mpBroadcast({type:'cursor',id:MP.myId,x:e.clientX/window.innerWidth,y:e.clientY/window.innerHeight});
});

function updateCursorLabel(id,xRatio,yRatio){
  const p=MP.players[id];if(!p||id===MP.myId)return;
  let el=document.getElementById('cursor_'+id);
  if(!el){
    el=document.createElement('div');el.className='cursor-label';el.id='cursor_'+id;
    const dot=document.createElement('div');dot.className='cursor-dot';dot.style.background=p.color;
    const nm=document.createElement('div');nm.className='cursor-name';nm.style.background=p.color;nm.textContent=p.name;
    el.appendChild(dot);el.appendChild(nm);
    document.body.appendChild(el);
  }
  const isTurn=MP.turnOrder[MP.currentTurnIdx]===id;
  el.style.left=`${xRatio*100}vw`;
  el.style.top=`${yRatio*100}vh`;
  el.style.opacity=isTurn?'1':'0.4';
  el.style.transform=isTurn?'scale(1.2)':'scale(1)';
}

function removeCursorLabel(id){document.getElementById('cursor_'+id)?.remove();}

// Mobile card highlight
function highlightCard(id,idx,cat){
  document.querySelectorAll(`.word-card[data-mp-owner="${id}"]`).forEach(c=>{
    c.removeAttribute('data-mp-owner');c.classList.remove('mp-highlight');c.style.removeProperty('--player-color');
  });
  if(idx==null)return;
  const p=MP.players[id];if(!p)return;
  const card=document.querySelector(`#word-grid .word-card[data-idx="${idx}"]`);
  if(card&&currentCat===cat){
    card.setAttribute('data-mp-owner',id);card.classList.add('mp-highlight');
    card.style.setProperty('--player-color',p.color);
  }
}

// BroadcastChannel (same device) + PeerJS (across devices)
function mpBroadcast(msg){
  if(!MP.active)return;
  msg.from=MP.myId;
  if(MP.channel)try{MP.channel.postMessage(msg);}catch(e){}
  Object.values(MP.conns).forEach(c=>{try{c.send(msg);}catch(e){}});
}

function handleMsg(msg){
  if(msg.from===MP.myId)return;
  if(msg.type==='join'){
    MP.players[msg.id]={name:msg.name,color:msg.color,pts:0,langPts:{it:0,de:0,en:0}};
    if(!MP.turnOrder.includes(msg.id))MP.turnOrder.push(msg.id);
    renderPlayerList();updateScorebar();
    // reply with state
    if(MP.isHost)mpBroadcast({type:'state',players:MP.players,turnOrder:MP.turnOrder,turnIdx:MP.currentTurnIdx,solved:serializeSolved()});
  }
  if(msg.type==='state'){
    msg.players&&Object.assign(MP.players,msg.players);
    msg.turnOrder&&(MP.turnOrder=msg.turnOrder);
    if(msg.turnIdx!=null)MP.currentTurnIdx=msg.turnIdx;
    if(msg.solved)deserializeSolved(msg.solved);
    renderPlayerList();updateScorebar();renderGrid(currentCat);
  }
  if(msg.type==='solved'){
    getSolved(msg.cat).add(msg.idx);
    getSolvedLang(msg.cat)[msg.idx]=msg.lang;
    // track lang pts for the sender
    const sender=MP.players[msg.from];
    if(sender){
      if(!sender.langPts)sender.langPts={it:0,de:0,en:0};
      sender.langPts[msg.lang]=(sender.langPts[msg.lang]||0)+(msg.pts||0)+(msg.bonusPts||0);
    }
    updateScore();renderGrid(currentCat);
  }
  if(msg.type==='event'){
    MP.currentEvent=msg.event;
    document.getElementById('mp-event-bar').textContent=msg.msg;
    document.getElementById('mp-event-bar').classList.add('on');
    renderGrid(currentCat);
  }
  if(msg.type==='cursor')updateCursorLabel(msg.id,msg.x,msg.y);
  if(msg.type==='card-focus')highlightCard(msg.from,msg.idx,msg.cat);
  if(msg.type==='card-blur')highlightCard(msg.from,null,null);
  if(msg.type==='turn-change'){MP.currentTurnIdx=msg.idx;showTurnBanner();updateScorebar();}
  if(msg.type==='pts-update'){
    const p=MP.players[msg.id];
    if(p){p.pts=msg.pts;if(msg.langPts)p.langPts=msg.langPts;}
    updateScorebar();
  }
  if(msg.type==='leave'){
    removeCursorLabel(msg.id);
    delete MP.players[msg.id];
    MP.turnOrder=MP.turnOrder.filter(i=>i!==msg.id);
    renderPlayerList();updateScorebar();
  }
  if(msg.type==='game-start'){
    // Reset all game state for everyone
    solved={};peeked={};hinted={};solvedLang={};milestoneCount=0;
    for(const k in peekTimers)clearTimeout(peekTimers[k]);
    peekTimers={};
    // Reset player pts
    for(const id in MP.players){MP.players[id].pts=0;MP.players[id].langPts={it:0,de:0,en:0};}
    MP.myPts=0;
    document.getElementById('multi-panel').classList.remove('open');
    updateScore();renderGrid(currentCat);
    updateScorebar();showTurnBanner();
    setTimeout(generateBonusEvent,800);
  }
}

function serializeSolved(){
  const out={};
  for(const c in solved)out[c]=[...solved[c]];
  return out;
}
function deserializeSolved(data){
  for(const c in data){if(!solved[c])solved[c]=new Set();data[c].forEach(i=>solved[c].add(i));}
}

function setupBC(code){
  if(MP.channel)MP.channel.close();
  MP.channel=new BroadcastChannel('ciaotipo_'+code);
  MP.channel.onmessage=e=>handleMsg(e.data);
}

// PeerJS setup
function setupPeer(code,asHost){
  if(!window.Peer)return;
  const peerId='ct_'+code+(asHost?'_host':'_'+MP.myId);
  MP.peer=new Peer(peerId,{debug:0});
  MP.peer.on('open',id=>{
    if(!asHost){
      const conn=MP.peer.connect('ct_'+code+'_host');
      conn.on('open',()=>{
        MP.conns['host']=conn;
        conn.send({from:MP.myId,type:'join',id:MP.myId,name:MP.myName,color:MP.myColor});
      });
      conn.on('data',d=>handleMsg(d));
    }
  });
  MP.peer.on('connection',conn=>{
    conn.on('open',()=>{MP.conns[conn.peer]=conn;});
    conn.on('data',d=>{handleMsg(d);mpBroadcast(d);}); // relay
  });
  MP.peer.on('error',()=>{}); // ignore peer errors silently
}

function renderPlayerList(){
  const list=document.getElementById('mp-plist');list.innerHTML='';
  MP.turnOrder.forEach(id=>{
    const p=MP.players[id];if(!p)return;
    const el=document.createElement('div');el.className='mp-player';
    const isMe=id===MP.myId;
    el.innerHTML=`<span class="mp-pdot" style="background:${p.color}"></span><span>${p.name}${isMe?' (あなた)':''}</span><span class="mp-pts">${p.pts||0}pt</span>`;
    list.appendChild(el);
  });
  document.getElementById('btn-mp-start').style.display=MP.isHost?'block':'none';
}

// Multi panel inner events
document.getElementById('btn-join-show').addEventListener('click',()=>{
  playClick();
  document.getElementById('mps-join').style.display='block';
});
document.getElementById('btn-host').addEventListener('click',()=>{
  playClick();
  MP.myId=genId();MP.myName=getMyName();MP.myColor=getMyColor();
  MP.players[MP.myId]={name:MP.myName,color:MP.myColor,pts:0,langPts:{it:0,de:0,en:0}};
  MP.roomCode=genCode();MP.isHost=true;MP.active=true;
  MP.turnOrder=[MP.myId];MP.currentTurnIdx=0;
  setupBC(MP.roomCode);
  try{setupPeer(MP.roomCode,true);}catch(e){}
  document.getElementById('mp-room-code').textContent=MP.roomCode;
  document.getElementById('mps-setup').style.display='none';
  document.getElementById('mps-room').style.display='block';
  renderPlayerList();updateScorebar();
});
document.getElementById('btn-join').addEventListener('click',()=>{
  playClick();
  const code=document.getElementById('mp-code-in').value.trim().toUpperCase();
  if(!code)return;
  MP.myId=genId();MP.myName=getMyName();MP.myColor=getMyColor();
  MP.roomCode=code;MP.isHost=false;MP.active=true;
  MP.players[MP.myId]={name:MP.myName,color:MP.myColor,pts:0,langPts:{it:0,de:0,en:0}};
  MP.turnOrder=[MP.myId];
  setupBC(code);
  try{setupPeer(code,false);}catch(e){}
  mpBroadcast({type:'join',id:MP.myId,name:MP.myName,color:MP.myColor,langPts:{it:0,de:0,en:0}});
  document.getElementById('mp-room-code').textContent=code;
  document.getElementById('mps-setup').style.display='none';
  document.getElementById('mps-join').style.display='none';
  document.getElementById('mps-room').style.display='block';
  renderPlayerList();updateScorebar();
});
document.getElementById('btn-mp-start').addEventListener('click',()=>{
  playOpen();
  // Reset all game data before broadcast
  solved={};peeked={};hinted={};solvedLang={};milestoneCount=0;
  for(const k in peekTimers)clearTimeout(peekTimers[k]);peekTimers={};
  for(const id in MP.players){MP.players[id].pts=0;MP.players[id].langPts={it:0,de:0,en:0};}
  MP.myPts=0;
  mpBroadcast({type:'game-start'});
  document.getElementById('multi-panel').classList.remove('open');
  updateScore();renderGrid(currentCat);
  updateScorebar();showTurnBanner();
  setTimeout(generateBonusEvent,800);
});
document.getElementById('btn-mp-leave').addEventListener('click',()=>{
  playClose();
  mpBroadcast({type:'leave',id:MP.myId});
  if(MP.channel){MP.channel.close();MP.channel=null;}
  if(MP.peer){MP.peer.destroy();MP.peer=null;}
  Object.keys(cursors).forEach(id=>removeCursorLabel(id));
  MP={active:false,isHost:false,roomCode:null,myId:null,myName:null,myColor:null,players:{},turnOrder:[],currentTurnIdx:0,channel:null,peer:null,conns:{},myPts:0,myTeamPts:0,currentEvent:null};
  document.getElementById('mps-setup').style.display='block';
  document.getElementById('mps-room').style.display='none';
  document.getElementById('mps-join').style.display='none';
  document.getElementById('scorebar').classList.remove('on');
  document.getElementById('mp-event-bar').classList.remove('on');
  document.getElementById('multi-panel').classList.remove('open');
});

// ================================================================
// EVENTS
// ================================================================
document.getElementById('btn-quit').addEventListener('click',()=>{playOpen();document.getElementById('modal-quit').classList.add('open');});
document.getElementById('btn-continue').addEventListener('click',()=>{playClose();document.getElementById('modal-quit').classList.remove('open');});
document.getElementById('btn-give-up').addEventListener('click',()=>{playClose();document.getElementById('modal-quit').classList.remove('open');showResult();});
document.getElementById('btn-end').addEventListener('click',()=>{playOpen();showResult();});
document.getElementById('btn-close-result').addEventListener('click',()=>{playClose();document.getElementById('modal-result').classList.remove('open');resetAll();});
document.getElementById('cat-select').addEventListener('change',e=>{playClick();currentCat=e.target.value;renderGrid(currentCat);});
document.getElementById('lang-select').addEventListener('change',e=>{playClick();currentLang=e.target.value;applyLocale();});
document.getElementById('accent-toggle').addEventListener('change',e=>{playClick();accentFree=e.target.checked;renderGrid(currentCat);});
document.getElementById('btn-theme').addEventListener('click',()=>{
  playClick();
  const cur=document.documentElement.getAttribute('data-theme');
  manualTheme=cur==='dark'?'light':'dark';applyTheme();
});
window.matchMedia('(prefers-color-scheme:dark)').addEventListener('change',()=>{if(manualTheme===null)applyTheme();});

// ================================================================
// INIT
// ================================================================
applyTheme();
applyLocale();

</script>
